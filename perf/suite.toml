family = "whisper"
quant = "q8_0"
pack_path = "tmp/models/whisper/whisper-large-v3-turbo.q8_0.repack.oasr"
audio_path = "tmp/audio/librispeech/237-134500-0000.wav"
reference = "FRANK READ ENGLISH SLOWLY AND THE MORE HE READ ABOUT THIS DIVORCE CASE THE ANGRIER HE GREW"
optional = true
gating = false
