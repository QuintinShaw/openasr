# --- "Beat comparable open source" (goal 3): same model (whisper-large-v3-turbo
# q8_0) timed on both openasr and whisper.cpp, best-of-N wall. gate_vs_cpp asserts
# openasr is not slower than whisper.cpp beyond cpp_slack.
# RECONCILED (2026-05-31): the prior contradiction (2026-05-30 baseline had
# openasr ~8.8% SLOWER, on a warm-parent / mismatched-thread run) is resolved.
# After the goals-7+8 memory/runtime work (zero-copy + gallocr reuse) a fresh
# MATCHED-THREAD (-t 4, the 4 perf cores) best-of-3 measured openasr 2790ms vs
# whisper.cpp 3083ms = openasr 9.5% FASTER — consistent across three independent
# measurements (suite default-thread 7.9%, matched -t4 9.5%, prior g78 10.9%).
# The thread-mismatch caveat is addressed (matched -t4 still shows openasr ahead);
# the result is now stable + defensible, so gate_vs_cpp is ENABLED (cpp_slack 0.05
# = ample headroom). The entry stays gating=false for the BASELINE (WER/RTF)
# regression set — the vs-cpp gate is its binding check. Both binary + model are
# host-local; skipped if either is missing.
[[entries]]
