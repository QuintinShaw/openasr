# OpenASR performance regression suite (committed).
#
# This file + perf/baselines/*.json + perf/PERFORMANCE.md are the committed
# performance "ruler". Model packs and audio live under tmp/ (gitignored,
# host-local) so the `pack_path`/`audio_path` values below are machine-specific
# — update them per host. The baseline NUMBERS are committed separately.
#
# One fixed clip is used across all three families so RTF/memory are directly
# comparable. Quant is per-entry: whisper/cohere at q8_0 (gating), qwen at fp16
# (non-gating until a transcript-verified q8_0 qwen pack exists).
#
# Run:    cargo run --release -p openasr-cli -- bench-suite
# Rebase: cargo run --release -p openasr-cli -- bench-suite --write-baseline perf/baselines/<host>.json

schema_version = 1

[default_tolerances]
rtf_rel = 0.25         # max +25% real-time-factor regression (single-run, generous)
peak_rss_rel = 0.20    # peak-RSS tolerance, applied to GATING entries when gate_peak_rss = true
wer_abs = 0.02         # max +0.02 absolute WER regression (the primary, deterministic gate)
gate_peak_rss = true   # peak-RSS now GATED on the stable gating entries (q8 whisper-tiny +
                       # cohere), locking the zero-copy + gallocr-reuse memory wins against
                       # silent regression. Noisy fp16 entries are gating=false -> not RSS-gated
                       # (compare_to_baseline skips !gating). Baseline: perf/baselines/<host>.json,
                       # refreshed 2026-05-31 to capture the SOTA packs (cohere q8 1453MB etc).
cpp_slack = 0.05       # openasr may be at most 5% slower than whisper.cpp before the vs-cpp gate fires
gate_vs_cpp = true     # goal-3 "beat OSS" now GATED + reconciled: matched-thread (-t 4) best-of-3
                       # measured openasr 2790ms vs whisper.cpp 3083ms = openasr 9.5% FASTER on
                       # whisper-large-v3-turbo q8, consistent across 3 runs (7.9% / 9.5% / 10.9%).
                       # The gate asserts openasr stays within cpp_slack of whisper.cpp (huge
                       # headroom since openasr leads); a regression below cpp now fails closed.

[[entries]]
id = "whisper-tiny-en-q8"
family = "whisper"
quant = "q8_0"
pack_path = "tmp/models/whisper/whisper-tiny.en.q8_0.repack.oasr"
audio_path = "tmp/audio/librispeech/237-134500-0000.wav"
reference = "FRANK READ ENGLISH SLOWLY AND THE MORE HE READ ABOUT THIS DIVORCE CASE THE ANGRIER HE GREW"
optional = true

[[entries]]
