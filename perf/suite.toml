# data2vec-audio-large-960h (#27 — 7th pretraining family, rides the wav2vec2-ctc
# architecture). Onboarded via a NEW pos-conv branch in the wav2vec2-ctc family:
# data2vec stacks 5 plain grouped convs (kernel 19, odd, no SamePad crop, gelu
# each, sequential + residual add) vs wav2vec2's single weight-norm conv; and uses
# a POST-norm encoder (its config do_stable_layer_norm=true is an ignored inherited
# field — forced post-norm at import). WER 0.00% metal==cpu (the WER gate caught the
# initial pre-norm bug: garbage -> 0% after the fix). 1.2GB source -> q4_k.
[[entries]]
