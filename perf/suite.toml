# qwen at q8_0 (the .dimfix pack transcribes correctly — the old "q8_0 broken"
# status is stale) and fp16, forming a quant-ordering group: q8_0 weights are
# the real memory lever (~46% smaller weights — the dominant term — vs fp16),
# and should not be slower. (KV-cache quantization was investigated and rejected:
# the production KV cache grows to actual decode length, ~40 tokens for a 6s clip,
# so quantizing it saves <1% peak; the pre-allocated arena is dead code.)
# qwen q3_k (OAML both-backend verdict: smaller K-quant via ggml's OWN CPU+Metal
# kernels — no GPU-specialization, no custom kernel). 571MB(q4k) -> 468MB (-18%);
# decode is bandwidth-bound at batch=1 so fewer bytes/token speeds BOTH backends.
# WER 0.00% on the LibriSpeech-clean clip (metal+cpu); the aggressive rung — WER
# risk on harder audio, so non-gating + a broader eval should harden before default.
