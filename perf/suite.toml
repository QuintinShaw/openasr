cpp_model = "tmp/models/whisper/ggml/ggml-large-v3-turbo-q8_0.bin"

# parakeet-ctc (NVIDIA FastConformer-CTC, goal-1 family). The first q8 pack (via
# the new `model-pack import parakeet-ctc --quantization q8-0`) shrinks the
# fp16 pack 1.3GB -> 840MB (-35%) at WER 0.00% (depthwise convs stay f16). q8+fp16
# form the RTF-ordering group q8 <= fp16. Non-gating; the ordering assertion is
# their gate.
# parakeet q4_k (the SOTA SIZE point): 1.3GB -> 588MB (-55% vs fp16, -30% vs q8) at
# WER 0.00% on metal+cpu (depthwise convs stay f16; 2D .weight ne0%256 -> q4_k).
# NOTE: q4_k is a SIZE win, NOT a speed win for this small (0.6b) compute-bound
# conformer — measured ~34% SLOWER RTF than q8 (the k-quant 4-bit unpack is heavier
# than q8's, same size<->speed tradeoff as qwen q3_k). So q4_k is deliberately NOT
# in the RTF-ordering group (it would violate "more compression not slower"); it is
# measured + reported, gated on WER only.
[[entries]]
