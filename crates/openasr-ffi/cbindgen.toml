# cbindgen config for the openasr-ffi C ABI. Regenerate with
# `scripts/generate-ffi-header.sh` (add `--check` to verify the committed
# header is up to date without writing).
language = "C"
header = """/* Generated by cbindgen from crates/openasr-ffi/src/lib.rs. Do not edit by
 * hand -- run scripts/generate-ffi-header.sh to regenerate. */"""
include_guard = "OPENASR_H"
braces = "SameLine"
line_length = 100
tab_width = 2
documentation = true
documentation_style = "doxy"
cpp_compat = true

[enum]
# Prefix variants with the enum name (OPENASR_STATUS_OK, not bare OK) --
# bare names like OK/F32/S16 are too likely to collide with other headers a
# C/Obj-C/Swift-bridging consumer already has in scope.
prefix_with_name = true
rename_variants = "ScreamingSnakeCase"
