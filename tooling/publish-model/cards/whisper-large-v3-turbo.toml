  "🌍 **多语言语音识别** — 支持多种语言转写，并可将语音翻译为英语",
  "🎙️ **零样本鲁棒性** — 继承 Whisper 大规模弱监督训练，在嘈杂场景下依然稳健",
  "🦀 **OpenASR 原生运行** — `.oasr` 包推理阶段无需 Python，针对 CPU 与 GPU 的极致性能优化",
