# Per-model card prose for openasr/mimo-v2.5-asr. Distilled from the upstream
# XiaomiMiMo/MiMo-V2.5-ASR and XiaomiMiMo/MiMo-Audio-Tokenizer Hugging Face model
# cards and Xiaomi's own published MiMo-V2.5-ASR benchmark tables
# (mimo.xiaomi.com/mimo-v2-5-asr). Upstream license = MIT. This repo distributes
# only the q4_k quantization tier -- do not imply fp16/q8_0 tiers are available.
# OpenASR's catalog entry for this model covers English (en), Cantonese (yue),
# and Mandarin Chinese (zh); the upstream base model's broader dialect training
# (Wu, Hokkien, Sichuanese) is noted for context only and is not a claim about
# languages this pack ships. Re-verify against upstream if the checkpoint changes.

