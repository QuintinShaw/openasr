highlights = [
  "🎯 **Refined word timestamps** — consumes a finished transcript's text plus the source audio and replaces a model family's own approximate per-word timestamps with aligner-refined spans (`--word-timestamps=aligned`)",
  "⚡ **Non-autoregressive** — a single forward pass over interleaved audio/text with argmax at `<timestamp>` positions (5000 80ms-wide bins), not incremental greedy decoding, so it is not dispatched through the qwen3-asr runtime",
  "🧩 **Shares its backbone with Qwen3-ASR** — the same audio-encoder + LM `thinker` tensor layout, byte-for-byte; only the final head differs (an independent 5000-way classification head instead of the tied vocabulary head)",
  "🔌 **Opt-in only** — a model family's own decode-time timestamps remain the default; this pack is only consulted when a transcribe call explicitly asks for `aligned` timestamps, and may auto-install under the same CLI consent flow as `--diarize`",
  "🦀 **Native in OpenASR** — `.oasr` packs run with no Python at inference, engineered for peak performance on CPU & GPU",
]

