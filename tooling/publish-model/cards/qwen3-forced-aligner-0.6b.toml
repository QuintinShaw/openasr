intro = """
Qwen3-ForcedAligner-0.6B is a **word-level forced-alignment** model from **Qwen**, sharing its
audio-encoder + LM `thinker` tensor layout byte-for-byte with **Qwen3-ASR** (same
`Qwen3ASRForConditionalGeneration` architecture). The only structural difference is the final
head: instead of a tied vocabulary `lm_head`, it uses an independent `Linear(hidden_size,
5000)` classification head over 80ms-wide timestamp bins. Given a transcript's text and its
source audio, it runs a single non-autoregressive forward pass and reads off word-boundary
timestamps at argmax `<timestamp>` positions -- refining a model family's own (typically
decode-time-approximate) per-word timestamps. This OpenASR repo repackages the weights as
`.oasr` packs that run natively in the OpenASR runtime -- no Python at inference, all decoding
local. It ships in **fp16** (maximum fidelity, recommended), **q8_0**, and **q4_k** builds.

**Not a standalone transcription model.** This pack cannot transcribe audio by itself; it is an
opt-in refinement step consumed via `openasr transcribe <audio> --model <asr-model>
--word-timestamps=aligned`. The base model's own timestamps (`--word-timestamps` /
`--word-timestamps=approximate`) remain the default -- nothing changes unless `aligned` is
requested explicitly.

**Verification status:** this is a brand-new catalog entry (no prior public listing). Local
verification so far covers a tensor-parity check against the real upstream checkpoint (every
source safetensors tensor maps 1:1 to a destination tensor, plus the two synthesized frontend
tensors, across fp16/q8_0/q4_k). This pack is staged in a private repo, not yet publicly listed.
"""

intro_zh = """
Qwen3-ForcedAligner-0.6B 是 **Qwen** 推出的**词级强制对齐**模型，其音频编码器 + LM 的
`thinker` 张量布局与 **Qwen3-ASR** 逐位相同（同一 `Qwen3ASRForConditionalGeneration`
架构）。唯一的结构差异在末端输出头：不使用绑定词表的 `lm_head`，而是在 80ms 宽的时间戳分箱上
使用独立的 `Linear(hidden_size, 5000)` 分类头。给定转写文本及其对应的原始音频，模型执行一次
非自回归前向计算，在 `<timestamp>` 位置的 argmax 处读出词边界时间戳——用于精修某个模型家族自身
（通常是解码时的近似值）的逐词时间戳。

这个仓库提供 OpenASR `.oasr` 格式包。OpenASR 会在本地完成加载、校验和推理，不会把音频上传到
云端。提供 `fp16`（最高保真，推荐）、`q8_0`、`q4_k` 三种量化版本。

**不是独立的转写模型。** 本模型包本身无法转写音频；它是通过
`openasr transcribe <audio> --model <asr-model> --word-timestamps=aligned` 调用的可选精修步骤。
基础模型自身的时间戳（`--word-timestamps` / `--word-timestamps=approximate`）仍是默认值——除非
显式要求 `aligned`，否则不会有任何变化。

**验证状态:** 这是一个全新的 catalog 条目（此前没有公开上架记录）。目前本地验证覆盖对照真实
上游检查点的张量对齐检查（每个源 safetensors 张量都一一映射到目标张量，外加两个合成的前端张量，
覆盖 fp16/q8_0/q4_k 三档）。本模型包目前仅暂存于私有仓库，尚未公开上架。
"""

