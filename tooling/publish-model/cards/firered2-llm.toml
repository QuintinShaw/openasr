# Per-model card prose for openasr/firered2-llm. Distilled from the upstream
# FireRedTeam/FireRedASR2-LLM Hugging Face model card and the FireRedASR2S
# technical report (arXiv:2603.10420 abstract). Upstream license = Apache-2.0.
# This repo distributes only the q4_k quantization tier -- do not imply
# fp16/q8_0 tiers are available. CRITICAL: FireRedASR2-LLM (Encoder-Adapter-LLM,
# 8B+ params, 2.89% avg Mandarin CER / 11.55% avg dialect CER) is a different,
# larger, stronger model than the already-published firered-aed-l-v2
# (FireRedASR2-AED, 1.1B params, 3.05%/11.67% avg CER) -- never conflate the two
# or swap their numbers. Re-verify against upstream if the checkpoint changes.

tagline = "FireRedTeam's LLM-backbone Mandarin-first bilingual ASR — 8B+ parameters engineered for state-of-the-art Chinese and dialect accuracy"
tagline_zh = "FireRedTeam 大语言模型驱动的中文语音识别旗舰 — 8B+ 参数，普通话与方言准确率双项领先"

highlights = [
