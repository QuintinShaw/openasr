超过 8B，是本站已收录的 **firered-aed-l-v2**（FireRedASR2-AED，1.1B 参数注意力编码器-解码器，
平均普通话字错率 3.05%、方言字错率 11.67%）的大参数升级版本。据 FireRedASR2S 技术报告
（arXiv:2603.10420）及上游模型卡公布的数据，FireRedASR2-LLM 在 4 项公开普通话基准上取得
**2.89% 平均字错率**，在 19 项公开中文方言/口音基准上取得 **11.55% 平均字错率**，在论文同一
对比表中优于 Doubao-ASR（3.69%/15.39%）、Qwen3-ASR（3.76%/11.85%）和 Fun-ASR（4.16%/12.76%）。
以上数据均为 FireRedASR2-LLM 自身的评测结果，请勿与较小的 firered-aed-l-v2（3.05%/11.67%）混淆。
该模型支持中英双语识别。本 OpenASR 包以 q4_k 量化精度发布，封装为 `.oasr` 格式在 OpenASR 引擎中
