# Per-model card prose for openasr/dolphin-base. Distilled (paraphrased, not
# copied) from the upstream DataoceanAI/dolphin-base model card. Claims are
# kept to what the upstream repo and architecture state; re-verify against the
# upstream card when the upstream weights change.
#
# STAGING NOTE (not public): this is the multilingual Dolphin tier, published
# to a PRIVATE HF repo only. Local sanity checking so far used a Mandarin clip
# (this family's `en` support is out of scope -- `en` is not in the advertised
# language list, so the shared JFK ruler is out-of-distribution and only used
# for the standard cross-quant drift signal). q4_k is dropped from this pack's
# quants: it showed an ~8.8% CER drift versus fp16 on the sanity clip (see
# below); dolphin-small's q4_k is clean at 0.0 drift and is unaffected.

tagline = "Multilingual speech recognition across 40 languages, base tier -- a compact 140M WeNet/ESPnet E-Branchformer (CTC + attention)"
tagline_zh = "覆盖 40 种语言的多语种语音识别（base 档）— 紧凑的 140M 参数 WeNet/ESPnet E-Branchformer（CTC + 注意力）"

# Same rationale as dolphin-small: this checkpoint's advertised language list
# does not include English, so the shared JFK ruler is out-of-distribution. It
# is still run against the shared JFK clip for the standard cross-quant
# ΔWER/CER drift signal, but the primary in-language sanity check uses a
# Mandarin clip.
bench_clip_phrase = "the shared 11s JFK clip (out-of-distribution, drift signal only) plus an in-language Mandarin sanity clip"
bench_clip_short = "JFK + zh sanity clip"
drift_metric_label = "ΔCER"

highlights = [
  "🌏 **40 languages, base tier** — the same multilingual E-Branchformer coverage as Dolphin Small (South Asian, Southeast Asian, Central Asian/Turkic, Chinese/Cantonese), at a fraction of the size",
  "🪶 **140M parameters** — roughly a third the width of the `small` checkpoint (512 vs 768 d_model, fewer layers), for tighter RAM and faster CPU decode when the small tier is overkill",
  "🧩 **Joint CTC + attention** — the same E-Branchformer encoder + Transformer decoder recipe with CTC/attention rescoring, verified against a shape-derived runtime contract shared with the rest of the Dolphin family",
  "🐬 **SentencePiece BPE vocab** — a shared subword vocabulary across all 40 languages (distinct from the cn-dialect family's fixed character vocab)",
  "🦀 **Native in OpenASR** — `.oasr` packs run with no Python at inference, engineered for peak performance on CPU & GPU",
]

