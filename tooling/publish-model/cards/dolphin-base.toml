更大的 **Dolphin Small** 采用相同的 **Dolphin / ESPnet** 配方：**E-Branchformer 编码器 +
Transformer 解码器**，以**联合 CTC + attention** 目标在覆盖卡片公布 40 种语言（南亚、东南亚、
中亚/突厥语系与中文，粤语单独列为 `yue`）的共享 SentencePiece BPE 词表上训练，编解码器宽度约为
small 档的三分之一——在不需要 small 档准确度余量的部署场景下，换取更小的内存与 CPU 占用。与
`dolphin-small` 一样，本检查点将本产品自身的中文方言颗粒度收敛为单一 `zh`（各方言的分别提示由
