  "🌐 **海量语音训练** — 基于 Whisper 680k 小时语音数据训练，底子扎实",
  "🦀 **OpenASR 原生运行** — `.oasr` 格式开箱即用，无需安装 Python，专为 CPU 和 Apple Silicon 优化",
]

