# FireRedASR2-AED (FireRedTeam Conformer encoder + Transformer decoder
# attention-based encoder-decoder, bilingual Mandarin + English + dialects).
# Same firered-aed family/executor and architecture as v1 (byte-identical
# per upstream source diff); v2 retrains on a larger vocab (8667 vs 7832
# tokens) and adds a post-hoc CTC branch this importer intentionally does not
# carry (no timestamp feature in this family yet). Only v2 ships -- v1
# (FireRedASR-AED-L) never went public and its catalog entry was replaced by
# this one rather than kept alongside it. Forward-compat floor pinned to the
# 0.1.9 release that ships the family, mirroring dolphin-cn-dialect-small's
# own min_core_version launch pattern. Flipped public 2026-07-08 as part of
# the 0.1.9 batch (release_public already true; catalog entry moves
# public:false -> public:true).
["firered-aed-l-v2"]
family = "firered-aed"
hf_repo = "OpenASR/firered-aed-l-v2"
release_public = true
aliases = ["firered-aed", "firered", "firered-aed-v2"]
pull_alias = "firered-aed-l-v2"
size = "l"
registry_id = "firered-aed-l-v2"
display_name = "FireRedASR2 AED-L"
license_name = "Apache-2.0"
license_source = "https://huggingface.co/FireRedTeam/FireRedASR2-AED/blob/main/README.md"
license_class = "permissive"
# Explicit override: the family default (LANG_BY_FAMILY["firered-aed"]) folds
# all Chinese dialects into "zh". FireRedASR2's own README lists 20+ Chinese
# dialects and arXiv:2603.10420 Table 2 benchmarks this AED checkpoint on 19
# public dialect/accent test sets (Sichuan x4, Shanghai, Henan, Hunan, Wuhan,
# Tianjin, ...), so this model is dialect-capable (see
# DIALECT_CAPABLE_FAMILIES) and lists every registered dialect it was tested
# on. The paper's "Liaoning" test set is a Northeastern-Mandarin variety and
# is normalized to the registered zh-dongbei code rather than added as a
# separate zh-liaoning code.
languages = [
    "en", "nan", "wuu", "yue", "zh", "zh-anhui", "zh-dongbei", "zh-fujian",
    "zh-gansu", "zh-guizhou", "zh-hebei", "zh-henan", "zh-hubei", "zh-hunan",
    "zh-jiangxi", "zh-ningxia", "zh-shaanxi", "zh-shandong", "zh-shanghai",
    "zh-shanxi", "zh-sichuan", "zh-tianjin", "zh-yunnan",
]
quants = ["fp16", "q8_0", "q4_k"]
recommended_quant = "q4_k"
sort_weight = 912
recommended = true
upstream_release_date = "2026-02-12"
min_core_version = "0.1.9"

