# Dolphin cn-dialect small (WeNet E-Branchformer, CTC + attention rescoring).
# Published PUBLIC to OpenASR/dolphin-cn-dialect-small: `release_public = true`
# routes the publish lane to a public HF repo and lets --public run the
# fail-closed public-listing gate and write the signed catalog.json entry,
# pinned to the immutable HF revision + per-pack sha256. Dolphin is
# dialect-capable (its executor ships a code->region-prompt map), so unlike other
# Chinese models it does NOT collapse regional dialects into a single `zh`:
# LANG_BY_FAMILY["dolphin"] advertises the base `zh` plus the registered province
# dialect codes (zh-sichuan, ...) as selectable source languages (see _catalog.py).
["dolphin-cn-dialect-small"]
family = "dolphin"
hf_repo = "OpenASR/dolphin-cn-dialect-small"
release_public = true
aliases = ["dolphin", "dolphin-cn-dialect"]
pull_alias = "dolphin"
size = "small"
registry_id = "dolphin-cn-dialect-small"
display_name = "Dolphin CN-Dialect Small"
license_name = "Apache-2.0"
license_source = "https://huggingface.co/DataoceanAI1/dolphi-cn-dialect-small/blob/main/README.md"
license_class = "permissive"
quants = ["fp16", "q8_0", "q4_k"]
recommended_quant = "fp16"
sort_weight = 905
recommended = true
upstream_release_date = "2026-05-13"
# Forward-compat runtime floor: the dolphin family (E-Branchformer CTC +
# attention rescoring, keep-quantized executor) needs the 0.1.3 core runtime, so
# older builds surface it as "update to use" and refuse the pull rather than
# fetching a pack they cannot load. Author-set; never derived from the current
# build version.
min_core_version = "0.1.3"

# Dolphin cn-dialect base (140M): the "base" tier of the same
# small.cn/cn-dialect-small architecture family -- identical char vocab +
# region-prompt scheme (same 14 registered dialect codes), only the
# encoder/decoder width shrinks (512 d_model / 8 heads / 2048 ffn / 6 layers vs
# small's 768/12/3072/12, cross-checked against each checkpoint's train.yaml).
# STAGED PRIVATE for now (release_public left unset/false): flip to public only
# after explicit user go-ahead, mirroring dolphin-cn-dialect-small's own launch.
["dolphin-cn-dialect-base"]
family = "dolphin"
hf_repo = "OpenASR/dolphin-cn-dialect-base"
size = "base"
registry_id = "dolphin-cn-dialect-base"
display_name = "Dolphin CN-Dialect Base"
license_name = "Apache-2.0"
license_source = "https://huggingface.co/DataoceanAI/dolphin-cn-dialect-base/blob/main/README.md"
license_class = "permissive"
quants = ["fp16", "q8_0", "q4_k"]
recommended_quant = "fp16"
upstream_release_date = "2026-05-13"
# Same forward-compat runtime floor as dolphin-cn-dialect-small: needs the
# dim-derivation import generalization landing in this same change, so pin the
# next core release rather than claim compatibility with anything older.
min_core_version = "0.1.8"

# Dolphin small (372M) + Dolphin base (140M): the multilingual siblings of the
# cn-dialect family. Card: "40 Eastern languages ... plus 22 Chinese dialects",
# SentencePiece BPE vocab (not char), and a two-level `<lang><region>` prompt
# (vs cn-dialect's fixed `<zh><region>`). `languages` lists the 40 officially
# supported languages (ISO 639-1 where one exists, 639-3 otherwise), collapsing
# the 22 Chinese dialects into the `zh` already among them (product's dialect-
# collapse rule -- Dolphin's OWN region-prompt granularity for those dialects is
# not separately advertised for the multilingual checkpoints, unlike the
# dedicated cn-dialect models). Cantonese (Dolphin's own `ct` code) is listed
# separately as `yue`, matching Dolphin's own languages.md, which treats it as
# a top-level language rather than a zh dialect.
["dolphin-small"]
family = "dolphin"
hf_repo = "OpenASR/dolphin-small"
size = "small"
registry_id = "dolphin-small"
display_name = "Dolphin Small"
license_name = "Apache-2.0"
license_source = "https://huggingface.co/DataoceanAI/dolphin-small/blob/main/README.md"
license_class = "permissive"
languages = [
    "ar", "az", "ba", "bn", "fa", "fil", "gu", "hi", "id", "ja", "jv", "kab",
    "kk", "km", "ko", "ks", "ky", "lo", "mn", "mr", "ms", "my", "ne", "or",
    "pa", "ps", "ru", "si", "su", "ta", "te", "tg", "th", "tl", "ug", "ur",
    "uz", "vi", "yue", "zh",
]
quants = ["fp16", "q8_0", "q4_k"]
recommended_quant = "fp16"
upstream_release_date = "2026-05-13"
# Needs both the dim-derivation import generalization AND the new multilingual
# BPE tokenizer / two-level language-region prompt landing in this same change.
min_core_version = "0.1.8"

