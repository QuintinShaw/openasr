name: Docker smoke

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-smoke:
    name: Docker build and mock API smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Build image
        run: docker build -t openasr:ci .

      - name: Start container
        # Mock smoke: the image default CMD is the fail-closed native server,
        # which exits without an installed pack, so pass explicit mock args.
        # No --rm: keep the container around so `docker logs` works on failure.
        run: docker run -d --name openasr-docker-smoke -p 18080:8080 openasr:ci serve --addr 0.0.0.0:8080 --backend mock

      - name: Wait for server
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:18080/health; then
              exit 0
            fi
            sleep 1
          done

          docker logs openasr-docker-smoke
          exit 1

      - name: Smoke endpoints
        run: |
          curl -fsS http://127.0.0.1:18080/health
          curl -fsS http://127.0.0.1:18080/v1/models
          curl -fsS http://127.0.0.1:18080/v1/audio/transcriptions \
            -F "file=@fixtures/jfk.wav" \
            -F "model=whisper-small" \
            -F "response_format=json" \
            -o /tmp/openasr-docker-transcription.json

          grep -q '"text"' /tmp/openasr-docker-transcription.json
          grep -q '"segments"' /tmp/openasr-docker-transcription.json

      - name: Check Docker Compose config
        run: docker compose -f compose.yaml config

      - name: Cleanup container
        if: always()
        run: docker rm -f openasr-docker-smoke || true
