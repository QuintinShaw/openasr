name: Vulkan lavapipe smoke

# Standing Vulkan regression smoke (origin: issues #153/#154/#155): builds
# openasr-core with --features vulkan and runs ignored, synthetic
# (weight-free) unit tests on Mesa's lavapipe software Vulkan ICD, catching
# ggml_vk_tensor_subbuffer misalignment aborts (and future Vulkan-path
# regressions of the same class) without real Vulkan hardware.
#
# Deliberately NOT wired to push/pull_request: the lavapipe/Vulkan SDK
# install and full ggml-vulkan build add several minutes per run that a
# Vulkan-specific regression does not need on the common path. Nightly cron
# plus manual dispatch keeps the signal without taxing every PR. Honest
# coverage note: lavapipe's minStorageBufferOffsetAlignment is 16 bytes;
# 64-byte-only misalignment shapes (Intel hardware) can still slip past --
# real-hardware validation stays part of the release process.
on:
  workflow_dispatch: {}
  schedule:
    - cron: "17 19 * * *"  # nightly, 19:17 UTC (03:17 Beijing)

permissions:
  contents: read

concurrency:
  group: vulkan-lavapipe-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lavapipe-smoke:
    name: xasr attention-weighted-values Vulkan smoke
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install Linux audio build dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Install Linux Vulkan SDK + lavapipe software ICD
        # Same recipe as the linux-x86_64-vulkan leg in release-binaries.yml:
        # vulkan-sdk gives cmake's FindVulkan the loader/headers/glslc
        # ggml-vulkan needs to build; mesa-vulkan-drivers ships Mesa's
        # llvmpipe-backed "lavapipe" ICD, a CPU-emulated Vulkan device this
        # GPU-less runner can actually enumerate and dispatch compute to.
        run: |
          set -euo pipefail
          wget -qO - https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo apt-key add -
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt-get update -y
          sudo apt-get install -y vulkan-sdk mesa-vulkan-drivers

      - name: Point the Vulkan loader at lavapipe
        # Mesa installs the lavapipe ICD manifest under
        # /usr/share/vulkan/icd.d/; the loader would find it there anyway,
        # but pin VK_ICD_FILENAMES explicitly so this job never silently
        # picks up some other ICD (or none) and instead fails closed with a
        # clear error if the manifest ever moves.
        run: |
          set -euo pipefail
          icd="$(find /usr/share/vulkan/icd.d -iname 'lvp_icd*.json' | head -n1)"
          if [ -z "$icd" ]; then
            echo "no lavapipe ICD manifest found under /usr/share/vulkan/icd.d" >&2
            find /usr/share/vulkan/icd.d -maxdepth 1 -type f >&2 || true
            exit 1
          fi
          echo "found lavapipe ICD: $icd"
          echo "VK_ICD_FILENAMES=$icd" >> "$GITHUB_ENV"

      - name: vulkaninfo summary (confirm lavapipe device is enumerable)
        run: vulkaninfo --summary

      - uses: dtolnay/rust-toolchain@1.95.0

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: vulkan-lavapipe-smoke

      # Debug (not release) build: this job checks that the Vulkan matmul
      # path runs without aborting, not its speed, so an optimized build
      # would only add compile time for no signal gained.
      - name: Build openasr-core test binary (vulkan feature)
        run: cargo test -p openasr-core --features vulkan --lib --no-run

      - name: Run the Vulkan lavapipe attention-offset smoke test
        env:
          RUST_BACKTRACE: "1"
          # ggml-vulkan's default device enumeration only auto-selects
          # discrete/integrated GPUs and explicitly refuses to fall back to a
          # CPU-type Vulkan device ("If only CPU devices are available,
          # return without devices" in ggml-vulkan.cpp) -- and lavapipe
          # reports VkPhysicalDeviceType::eCpu. GGML_VK_VISIBLE_DEVICES is
          # ggml-vulkan's CUDA_VISIBLE_DEVICES-style override: when set, it
          # takes the listed device indices as-is with no GPU-type filter,
          # which is the only way to get ggml-vulkan to actually pick up
          # lavapipe (device index 0 -- the sole ICD registered in this job).
          GGML_VK_VISIBLE_DEVICES: "0"
        run: |
          cargo test -p openasr-core --features vulkan --lib \
            models::xasr_zipformer::encoder_graph::tests::xasr_attention_weighted_values_vulkan_head_offset_smoke \
            -- --exact --ignored --nocapture
