name: Release binaries

# Three ways in:
#   1. push: tags v* -- a maintainer pushes an annotated release tag directly
#      (e.g. `git push --follow-tags` from scripts/bump-version.sh). Real tag
#      pushes fire this natively.
#   2. workflow_call -- release-core.yml calls this workflow directly (as a
#      job, not a webhook) right after it creates the vX.Y.Z tag + GitHub
#      Release. This is required because a tag created through the GITHUB_TOKEN
#      API does *not* fire the `push: tags` event (GitHub does not cascade
#      Actions-token-authored pushes into further workflow runs), so without
#      this explicit call the full release matrix silently never builds.
#   3. workflow_dispatch -- manual re-run/dry-run, with the same `ref` input
#      as workflow_call so a maintainer can target an existing tag (e.g. to
#      retry a failed platform leg, or dry-run the upload/completeness logic
#      against an already-released tag without touching its assets).
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (tag) to build; empty = default branch"
        required: false
        default: ""
      dry_run:
        description: "Evaluate upload/completeness logic but do not upload or edit the release"
        required: false
        default: false
        type: boolean
      only_target:
        description: "Build only this matrix.target key (empty = all legs; for validating a single platform without the full matrix)"
        required: false
        default: ""
  workflow_call:
    inputs:
      ref:
        description: "Git ref (tag) to build"
        required: false
        type: string
        default: ""
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ matrix.timeout || 60 }}
    # Escape hatch for future legs whose toolchain story is still settling:
    # mark them `experimental: true` and they may fail without failing the
    # run (their archives simply drop out of the artifact set) until they
    # prove green. Every current leg has, so none carry the flag today.
    continue-on-error: ${{ matrix.experimental || false }}
    # id-token/attestations for the build-provenance attestation step below
    # (every leg, including experimental ones, since they still ship a
    # release asset); this job only reads the repo and uploads a workflow
    # artifact, so contents stays read-only (narrower than the
    # workflow-level default, and within whatever release-core.yml's
    # `binaries` job granted when this runs via workflow_call).
    permissions:
      contents: read
      id-token: write
      attestations: write
    # Distributed binaries must be portable. build.rs auto-enables GGML_NATIVE
    # (-march=native) when host==target on x86, which is correct for local
    # build-and-run but would tune these released x86 binaries to the CI
    # runner's CPU and SIGILL on older end-user CPUs. Force it off here; power
    # users tune locally via --features native or OPENASR_GGML_NATIVE=1.
    env:
      OPENASR_GGML_NATIVE: "0"
      # AMD HIP SDK "PRO Edition" silent-installer release train, matched to
      # llama.cpp's current Windows HIP release job.
      HIPSDK_INSTALLER_VERSION: 26.Q1
      # Windows Vulkan loader (vulkan-1.dll) redistributable, bundled into the
      # windows-x86_64-vulkan CLI zip -- see the "Stage Vulkan loader" step
      # below for why (#132: STATUS_DLL_NOT_FOUND on machines with no GPU
      # driver). This is a *runtime redistributable* pin, independent of
      # VULKAN_VERSION above (that one pins the *build-time* SDK used to
      # compile/link openasr.exe). Kept in lockstep with openasr-app's
      # apps/desktop/scripts/stage-vulkan-loader.mjs, which pins the identical
      # version + both hashes for the desktop sidecar bundle -- bump all three
      # together in both repos, cross-checked against LunarG's own published
      # hash at https://vulkan.lunarg.com/sdk/sha/<version>/windows/VulkanRT-X64-<version>-Components.zip.json.
      VULKAN_LOADER_VERSION: 1.4.350.0
      # sha256 of the downloaded vulkan-runtime-components.zip archive.
      VULKAN_LOADER_ARCHIVE_SHA256: 23ce69f32cef3e2799617e2b1776cd0c71030d23a91f8375821cc40d76b185b9
      # sha256 of x64/vulkan-1.dll extracted from that archive -- a second,
      # independent pin so a change in the archive's internal layout (wrong
      # file extracted) is caught even though the archive-level hash above
      # already matched.
      VULKAN_LOADER_DLL_SHA256: 0419974f00e82a3d619077ba414da265a774f8db9d45ad93bc1843f44b2c2c1f
      # Single-leg validation gate. jobs.<job_id>.if cannot see the `matrix`
      # context (only jobs.<job_id>.steps[*].if can), so the only_target
      # filter is computed once here (job-level `env:` can see `matrix`, same
      # as RELEASE_DIR below) and every step's `if` below ANDs this in. On a
      # workflow_dispatch run with only_target set, every step short-circuits
      # to a no-op for non-matching legs; every other trigger (push tag,
      # workflow_call, or a dispatch that leaves only_target empty) builds
      # every leg exactly as before.
      LEG_SELECTED: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.only_target == '' || matrix.target == github.event.inputs.only_target }}
      # Where the built binary + build.rs-staged runtime DLLs land. A native
      # leg (no matrix.rust_target) builds into target/release; a cross leg
      # (--target <triple>) builds into target/<triple>/release. Every package/
      # smoke step reads $RELEASE_DIR so both shapes share one code path.
      RELEASE_DIR: ${{ matrix.rust_target && format('target/{0}/release', matrix.rust_target) || 'target/release' }}
    # Asset naming: `matrix.target` is the INTERNAL key (used for cache keys,
    # smoke/gating conditions, and the upload-artifact name); `matrix.asset` is
    # the FRIENDLY, user-facing filename segment that lands in the release as
    # openasr-<version>-<asset>.<ext>. The mapping normalizes the Rust target
    # triple to human terms: unknown-linux-gnu -> linux, apple-darwin -> macos,
    # pc-windows-msvc -> windows; aarch64 -> arm64 (x86_64 unchanged); the AMD
    # GPU leg is `-rocm` on every OS (Windows' internal feature is `hip`, but
    # the asset name stays `-rocm` for cross-platform consistency -- this only
    # renames the asset, never the build feature flag); gnu libc is the
    # unsuffixed default, musl would carry `-musl`.
    #
    # NOTE: jobs.verify-completeness below hardcodes this same asset/ext list
    # (TARGETS, now friendly asset names) to assert the release ends up with
    # every archive. Keep both in sync when adding/removing a leg. The
    # xcframework job further below is a separate, non-matrix leg (macOS/iOS
    # SDK, not a CLI binary) but its asset is folded into the same TARGETS list
    # -- keep that in sync too. Legs marked `experimental: true` are NOT in
    # TARGETS (they may drop out until proven green), so keep them out of it.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: linux-x86_64
            binary_name: openasr
            archive_ext: tar.gz
          # Native arm64 GitHub-hosted runner (no cross-compile toolchain
          # needed). Both llama.cpp and competing ASR releases ship a Linux
          # arm64 build; this was our most visible gap.
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            asset: linux-arm64
            binary_name: openasr
            archive_ext: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            asset: macos-x86_64
            binary_name: openasr
            archive_ext: tar.gz
          # Pinned (not macos-latest, which migrates to macOS 26 from
          # 2026-06-15): released binaries need a deterministic build
          # environment that does not drift under the alias.
          - os: macos-15
            target: aarch64-apple-darwin
            asset: macos-arm64
            binary_name: openasr
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: windows-x86_64
            binary_name: openasr.exe
            archive_ext: zip
          # GPU-feature Windows variants. The hosted runners have no GPU, so
          # these jobs validate "compiles + links + (where the loader allows)
          # launches"; GPU inference is validated on real hardware.
          - os: windows-latest
            target: x86_64-pc-windows-msvc-vulkan
            asset: windows-x86_64-vulkan
            binary_name: openasr.exe
            archive_ext: zip
            features: vulkan
            timeout: 120
          - os: windows-latest
            target: x86_64-pc-windows-msvc-cuda
            asset: windows-x86_64-cuda
            binary_name: openasr.exe
            archive_ext: zip
            features: cuda
            timeout: 180
          # AMD HIP variant. Builds openasr-core's default consumer RDNA2/3/
          # 3.5/4 fat code object (gfx1030/31/32/35, gfx1100/01/02, gfx1150/
          # 51, gfx1200/01; see hip_gpu_targets() in build.rs for provenance).
          # HIP is statically linked (build.rs use_backend_dl is false for HIP),
          # but still dynamically loads the ROCm runtime/BLAS DLLs staged
          # below, so it cannot launch on this GPU-less, driver-less runner
          # any more than the CUDA leg can; build + package only.
          # Asset is `-rocm` (not `-hip`) to match the Linux AMD leg's name.
          # Pinned to windows-2022 like llama.cpp's HIP release job:
          # windows-latest's VS 2026 STL declares the C99 floating
          # comparison macros (isgreater & co.) in a way ROCm clang's HIP
          # wrapper headers cannot overload ("__device__ function cannot
          # overload __host__ __device__ function" in __clang_hip_cmath.h),
          # so the device compile only works against the VS 2022 STL.
          - os: windows-2022
            target: x86_64-pc-windows-msvc-hip
            asset: windows-x86_64-rocm
            binary_name: openasr.exe
            archive_ext: zip
            features: hip
            timeout: 240
          # Windows arm64 (cross-compiled from the x86_64 windows runner via
          # --target aarch64-pc-windows-msvc). CPU-only, no GPU feature.
          #
          # NEEDS CI VALIDATION -- experimental (non-blocking, excluded from
          # verify-completeness) until proven green on a real runner:
          #   * The runner is x86_64, so the produced arm64 exe cannot execute
          #     here; the smoke steps are skipped for cross legs (matrix.rust_target
          #     set), so this validates "compiles + links + packages" only.
          #   * build.rs drives ggml's C++ via CMake. It needs the "MSVC v143
          #     ARM64 build tools" VS component (arm64 headers/libs), installed
          #     below via `vs_installer.exe modify` -- the hosted runner's
          #     preinstalled VS only carries the x86_64 v143 toolset. It compiles
          #     with clang-cl (installed/verified below), not MSVC cl: ggml's ARM
          #     CPU backend refuses cl ("MSVC is not supported for ARM, use
          #     clang"). build.rs forces the Ninja generator + an explicit
          #     CMAKE_SYSTEM_PROCESSOR=ARM64 for this leg so ggml selects the ARM
          #     CPU backend (a single ARM64 variant; GGML_CPU_ALL_VARIANTS is
          #     off, as its multi-ISA table has no Windows-ARM entry) instead of
          #     mis-detecting the x86_64 host and building x86 SSE/AVX variants
          #     that fail the link -- see the is_windows_arm64 comments in
          #     build.rs for the full reasoning.
          #   * ring/rustls support aarch64-pc-windows-msvc (0.17+), so the Rust
          #     dep tree itself is expected to be fine.
          # Validate via `workflow_dispatch` before the next real release, and
          # once green: drop `experimental` and add windows-arm64:zip to
          # verify-completeness TARGETS to make it a required asset.
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            asset: windows-arm64
            rust_target: aarch64-pc-windows-msvc
            binary_name: openasr.exe
            archive_ext: zip
            experimental: true
            timeout: 120
          # Fully static Linux musl CPU legs (single self-contained binary that
          # runs on any Linux userland -- Alpine, distroless, glibc hosts alike).
          # Both are cross-compiled with cargo-zigbuild (zig cc/c++ = clang plus a
          # bundled musl libc + libc++) on the stock x86_64 ubuntu runner: zig is
          # a reliable, self-contained cross toolchain (installed via pip's
          # `ziglang` wheel + `cargo install cargo-zigbuild`), which sidesteps the
          # old blockers -- Ubuntu ships no apt `musl-g++` for ggml's C++, and a
          # musl-cross download source (musl.cc) proved flaky/offline in CI. See
          # the "Install musl cross build toolchain" + "Build static ALSA for
          # musl" + zigbuild branch in the build step below, and the is_musl
          # handling in crates/openasr-core/build.rs (static libc++ instead of
          # dynamic libstdc++/libgomp; explicit CMake cross toolchain file).
          #
          # `zigbuild: true` selects `cargo zigbuild` over `cargo build`;
          # rust_target is set so RELEASE_DIR / the cross-leg smoke skips behave
          # exactly like the windows-arm64 cross leg (build + package only -- the
          # x86_64 static binary could run on the runner, but the aarch64 one
          # cannot, so both are treated as cross for a uniform code path). Kept
          # `experimental: true` (non-blocking, excluded from
          # verify-completeness) until they prove green on a real runner; once
          # green, drop `experimental` and add linux-x86_64-musl:tar.gz +
          # linux-arm64-musl:tar.gz to verify-completeness TARGETS.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset: linux-x86_64-musl
            rust_target: x86_64-unknown-linux-musl
            binary_name: openasr
            archive_ext: tar.gz
            zigbuild: true
            experimental: true
            timeout: 90
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            asset: linux-arm64-musl
            rust_target: aarch64-unknown-linux-musl
            binary_name: openasr
            archive_ext: tar.gz
            zigbuild: true
            experimental: true
            timeout: 90
          # Linux GPU-feature variants, same rationale as the Windows ones
          # above (no GPU on the hosted runner; build+package validated
          # here, GPU inference validated on real hardware). Pinned to
          # ubuntu-22.04 (not ubuntu-latest) so the LunarG/ROCm apt repos
          # below target a codename known to exist in both.
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu-vulkan
            asset: linux-x86_64-vulkan
            binary_name: openasr
            archive_ext: tar.gz
            features: vulkan
            timeout: 90
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu-cuda
            asset: linux-x86_64-cuda
            binary_name: openasr
            archive_ext: tar.gz
            features: cuda
            timeout: 120
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu-rocm
            asset: linux-x86_64-rocm
            binary_name: openasr
            archive_ext: tar.gz
            features: hip
            timeout: 240

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
          ref: ${{ inputs.ref || github.ref }}

      - name: Resolve workspace version
        shell: bash
        # Single source of truth: [workspace.package] version in the root
        # Cargo.toml (same extraction release-core.yml uses). Archives are
        # named openasr-<version>-<target>.<ext> to match the release assets.
        run: |
          set -euo pipefail
          version="$(grep -m1 -E '^version = "' Cargo.toml | sed -E 's/^version = "([^"]+)".*/\1/')"
          if [ -z "${version}" ]; then
            echo "could not read workspace version from Cargo.toml" >&2
            exit 1
          fi
          echo "OPENASR_VERSION=${version}" >> "${GITHUB_ENV}"

      - name: Install Linux audio build dependencies
        if: runner.os == 'Linux' && env.LEG_SELECTED == 'true'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Install Linux Vulkan SDK
        if: runner.os == 'Linux' && matrix.features == 'vulkan' && env.LEG_SELECTED == 'true'
        # LunarG's apt recipe for jammy (matches llama.cpp's ubuntu-22.04
        # Vulkan release job). vulkan-sdk gives cmake's FindVulkan the
        # loader/headers/glslc it needs; mesa-vulkan-drivers gives the
        # llvmpipe software ICD, so the produced binary can actually launch
        # and run CPU-emulated Vulkan on this GPU-less runner.
        run: |
          set -euo pipefail
          wget -qO - https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo apt-key add -
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt-get update -y
          sudo apt-get install -y vulkan-sdk mesa-vulkan-drivers

      # The ROCm SDK plus the fat multi-gfx build overflow the hosted
      # runner's disk (observed "No space left on device"); drop the
      # preinstalled toolchains this job never touches first. Same action
      # llama.cpp's ubuntu-rocm release job uses.
      - name: Free up disk space
        if: runner.os == 'Linux' && matrix.features == 'hip' && env.LEG_SELECTED == 'true'
        uses: ggml-org/free-disk-space@v1.3.1
        with:
          tool-cache: true

      - name: Install Linux ROCm/HIP SDK
        if: runner.os == 'Linux' && matrix.features == 'hip' && env.LEG_SELECTED == 'true'
        # AMD's official apt repo (the recipe llama.cpp's ubuntu-22-rocm
        # release job uses). rocm-hip-sdk provides hipcc/the HIP clang
        # toolchain, rocBLAS, and hipBLAS; ROCM_PATH lets both cmake's
        # FindHIP language support and openasr-core's build.rs
        # hip_toolkit_path() locate it.
        run: |
          set -euo pipefail
          sudo mkdir --parents --mode=0755 /etc/apt/keyrings
          wget -qO - https://repo.radeon.com/rocm/rocm.gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/rocm.gpg
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/rocm.gpg] https://repo.radeon.com/rocm/apt/7.2.1 jammy main" \
            | sudo tee /etc/apt/sources.list.d/rocm.list
          printf 'Package: *\nPin: release o=repo.radeon.com\nPin-Priority: 600\n' \
            | sudo tee /etc/apt/preferences.d/rocm-pin-600
          sudo apt-get update -y
          sudo apt-get install -y rocm-hip-sdk
          echo "ROCM_PATH=/opt/rocm" >> "${GITHUB_ENV}"
          echo "/opt/rocm/bin" >> "${GITHUB_PATH}"

      - name: Install Windows Vulkan SDK
        if: matrix.features == 'vulkan' && runner.os == 'Windows' && env.LEG_SELECTED == 'true'
        shell: pwsh
        env:
          VULKAN_VERSION: 1.4.313.2
        # LunarG silent install (the recipe llama.cpp's Windows Vulkan CI
        # uses). Provides vulkan-1.lib, glslc, SPIRV-Headers, and the loader
        # runtime that lets the produced exe launch on this GPU-less runner.
        run: |
          curl.exe --fail --location --retry 3 `
            --output "$env:RUNNER_TEMP\vulkan-sdk-installer.exe" `
            "https://sdk.lunarg.com/sdk/download/$env:VULKAN_VERSION/windows/vulkansdk-windows-X64-$env:VULKAN_VERSION.exe"
          & "$env:RUNNER_TEMP\vulkan-sdk-installer.exe" --accept-licenses --default-answer --confirm-command install | Out-Null
          Add-Content $env:GITHUB_ENV "VULKAN_SDK=C:\VulkanSDK\$env:VULKAN_VERSION"
          Add-Content $env:GITHUB_PATH "C:\VulkanSDK\$env:VULKAN_VERSION\Bin"

      - name: Install MSVC ARM64 build tools
        if: matrix.rust_target == 'aarch64-pc-windows-msvc' && env.LEG_SELECTED == 'true'
        shell: pwsh
        # windows-latest preinstalls VS with only the x86_64 v143 toolset.
        # build.rs cross-compiles ggml for aarch64-pc-windows-msvc via
        # cc::windows_registry::find_tool(target=aarch64-...), which needs the
        # Hostx64/arm64 `cl.exe` from the "VC.Tools.ARM64" component. Modify
        # the existing VS install in place rather than provisioning a second
        # VS install.
        run: |
          $ErrorActionPreference = "Stop"
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installPath = & $vswhere -latest -products * -property installationPath
          if (-not $installPath) { Write-Error "no Visual Studio installation found"; exit 1 }
          $installer = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe"
          $proc = Start-Process -FilePath $installer -ArgumentList @(
            "modify",
            "--installPath", "`"$installPath`"",
            "--add", "Microsoft.VisualStudio.Component.VC.Tools.ARM64",
            "--quiet", "--norestart", "--nocache"
          ) -NoNewWindow -PassThru -Wait
          if ($proc.ExitCode -ne 0) {
            Write-Error "vs_installer modify failed with exit code $($proc.ExitCode)"
            exit 1
          }

      - name: Ensure clang-cl (windows-arm64)
        if: matrix.rust_target == 'aarch64-pc-windows-msvc' && env.LEG_SELECTED == 'true'
        shell: pwsh
        # ggml's ARM CPU backend refuses MSVC cl ("MSVC is not supported for
        # ARM, use clang"), so build.rs compiles this cross with clang-cl (which
        # still links the MSVC ARM64 libs installed above). windows-latest
        # preinstalls LLVM, but pull it via choco if a runner image ever drops
        # it. build.rs invokes `clang-cl` off PATH.
        run: |
          $existing = Get-Command clang-cl -ErrorAction SilentlyContinue
          if ($existing) {
            $clangClPath = $existing.Source
          } else {
            $llvmBin = "C:\Program Files\LLVM\bin"
            if (-not (Test-Path "$llvmBin\clang-cl.exe")) { choco install llvm -y }
            Add-Content $env:GITHUB_PATH $llvmBin
            $clangClPath = "$llvmBin\clang-cl.exe"
          }
          # GITHUB_PATH only affects later steps; verify via the resolved path so
          # this step works even right after a fresh install.
          & $clangClPath --version

      - name: Ensure Ninja
        if: runner.os == 'Windows' && (matrix.features == 'vulkan' || matrix.features == 'cuda' || matrix.features == 'hip' || matrix.rust_target == 'aarch64-pc-windows-msvc') && env.LEG_SELECTED == 'true'
        shell: pwsh
        # build.rs forces the Ninja generator for Windows GPU-feature builds
        # and the windows-arm64 cross leg (Linux keeps cmake's default Unix
        # Makefiles generator).
        run: |
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) { choco install ninja -y }
          ninja --version

      - name: Cache AMD HIP SDK install
        if: runner.os == 'Windows' && matrix.features == 'hip' && env.LEG_SELECTED == 'true'
        id: cache-hip-sdk
        uses: actions/cache@v6
        with:
          path: C:\Program Files\AMD\ROCm
          key: hip-sdk-${{ env.HIPSDK_INSTALLER_VERSION }}-${{ runner.os }}

      - name: Install AMD HIP SDK
        if: runner.os == 'Windows' && matrix.features == 'hip' && steps.cache-hip-sdk.outputs.cache-hit != 'true' && env.LEG_SELECTED == 'true'
        shell: pwsh
        # Same recipe llama.cpp's Windows HIP release job uses (no self-hosted
        # runner needed): AMD publishes a silent installer for the consumer
        # "PRO Edition" HIP SDK directly, so a GitHub-hosted windows-latest
        # runner can provision it like any other toolchain.
        run: |
          $ErrorActionPreference = "Stop"
          $url = "https://download.amd.com/developer/eula/rocm-hub/AMD-Software-PRO-Edition-$env:HIPSDK_INSTALLER_VERSION-Win11-For-HIP.exe"
          Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\rocm-install.exe"
          $proc = Start-Process "$env:RUNNER_TEMP\rocm-install.exe" -ArgumentList '-install' -NoNewWindow -PassThru
          if (-not $proc.WaitForExit(600000)) {
            Write-Error "AMD HIP SDK installation timed out after 10 minutes."
            $proc.Kill()
            exit 1
          }
          if ($proc.ExitCode -ne 0) {
            Write-Error "AMD HIP SDK installation failed with exit code $($proc.ExitCode)"
            exit 1
          }

      - name: Resolve HIP SDK path
        if: runner.os == 'Windows' && matrix.features == 'hip' && env.LEG_SELECTED == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $clang = Get-ChildItem 'C:\Program Files\AMD\ROCm\*\bin\clang.exe' | Select-Object -First 1
          if (-not $clang) { Write-Error "AMD HIP SDK not found under C:\Program Files\AMD\ROCm"; exit 1 }
          $hipRoot = $clang.Directory.Parent.FullName
          & $clang.FullName --version
          Add-Content $env:GITHUB_ENV "HIP_PATH=$hipRoot"
          Add-Content $env:GITHUB_PATH "$hipRoot\bin"

      - name: Install CUDA toolkit (Linux)
        if: runner.os == 'Linux' && matrix.features == 'cuda' && env.LEG_SELECTED == 'true'
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: "13.2.0"
          method: network
          # The Linux apt repo splits CUDA 13 differently from the Windows
          # silent installer: nvvm is folded into cuda-nvcc, the CUB/Thrust
          # headers live in cuda-cccl, cuBLAS is a lib* package (installed
          # via non-cuda-sub-packages below), and the libcuda.so driver stub
          # ggml-cuda's VMM path links against comes from cuda-driver-dev.
          sub-packages: '["nvcc", "crt", "cudart", "cudart-dev", "cccl", "driver-dev"]'
          non-cuda-sub-packages: '["libcublas", "libcublas-dev"]'
          use-github-cache: true

      - name: Install CUDA toolkit (Windows)
        if: runner.os == 'Windows' && matrix.features == 'cuda' && env.LEG_SELECTED == 'true'
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          # 13.x is the first CUDA line whose host_config.h accepts the VS
          # 2026 (MSVC 19.5x) toolset on windows-latest; 12.x rejects it with
          # "unsupported Microsoft Visual Studio version". No VS-integration
          # sub-package: the build uses the Ninja generator (build.rs).
          cuda: "13.2.0"
          method: network
          # CUDA 13 splits the compiler across sub-packages: nvcc is only the
          # driver, crt carries the front-end headers (include/crt/*), and
          # nvvm carries the cicc device compiler nvcc dispatches to (missing
          # nvvm fails with an unexpanded %CICC_PATH%). cudart supplies the
          # runtime DLLs shipped in the archive, cublas(+dev) the GEMM
          # library, thrust the CUB/CCCL headers ggml-cuda's sort/scan
          # kernels use (still named thrust_13.x in the Windows silent
          # installer; an unknown name fails the installer with exit code
          # 3772776473). Network subset keeps this ~GBs smaller than the
          # full installer.
          sub-packages: '["nvcc", "crt", "nvvm", "cudart", "cublas", "cublas_dev", "thrust"]'
          use-github-cache: true

      - name: Install Rust toolchain
        if: env.LEG_SELECTED == 'true'
        run: |
          rustup toolchain install 1.95.0 --profile minimal
          rustup default 1.95.0
          rustc --version
          cargo --version

      # Cross legs (matrix.rust_target set, e.g. the windows-arm64 experimental
      # leg) need their std installed for the target triple; native legs skip
      # this. Runs in the default shell (pwsh on Windows, bash elsewhere); the
      # `rustup target add` invocation is identical in both.
      - name: Add cross Rust target
        if: matrix.rust_target && env.LEG_SELECTED == 'true'
        run: rustup target add ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        if: env.LEG_SELECTED == 'true'
        with:
          shared-key: release-binaries-${{ matrix.target }}

      # musl legs are cross-compiled with cargo-zigbuild: zig cc/c++ is a
      # self-contained clang + bundled musl libc/libc++ cross toolchain, so no
      # apt musl-cross (or the flaky musl.cc download) is needed. ziglang ships
      # as a pip wheel (cargo-zigbuild auto-discovers `python3 -m ziglang`); the
      # target std comes from the "Add cross Rust target" step above.
      - name: Install musl cross build toolchain
        if: matrix.zigbuild && env.LEG_SELECTED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --user ziglang
          cargo install cargo-zigbuild --version 0.23.0 --locked
          python3 -m ziglang version

      # ggml's CPU backend pulls in ALSA transitively (openasr-cli -> cpal ->
      # alsa-sys) on Linux, and a fully static musl binary needs a musl-built
      # static libasound.a -- the runner's apt libasound2-dev is glibc-only.
      # Cross-build ALSA from its official release tarball with the same zig cc
      # (targeting <arch>-linux-musl), then point alsa-sys' pkg-config probe at
      # it via the target-scoped PKG_CONFIG_* vars (PKG_CONFIG_LIBDIR_<target>
      # replaces the search path so the host glibc alsa.pc is never picked).
      - name: Build static ALSA for musl
        if: matrix.zigbuild && env.LEG_SELECTED == 'true'
        shell: bash
        env:
          ALSA_VERSION: 1.2.13
        run: |
          set -euo pipefail
          arch="${{ matrix.rust_target }}"; arch="${arch%%-*}"   # x86_64 | aarch64
          zig_triple="${arch}-linux-musl"
          wrapper="${RUNNER_TEMP}/zigcc-${arch}.sh"
          cat > "${wrapper}" <<EOF
          #!/bin/sh
          exec python3 -m ziglang cc -target ${zig_triple} "\$@"
          EOF
          chmod +x "${wrapper}"

          cd "${RUNNER_TEMP}"
          curl -fL --retry 5 --retry-all-errors --connect-timeout 30 \
            -o alsa-lib.tar.bz2 \
            "https://www.alsa-project.org/files/pub/lib/alsa-lib-${ALSA_VERSION}.tar.bz2"
          tar xjf alsa-lib.tar.bz2
          cd "alsa-lib-${ALSA_VERSION}"
          CC="${wrapper}" ./configure \
            --host="${zig_triple}" \
            --prefix="${RUNNER_TEMP}/alsa-musl" \
            --enable-static --disable-shared --disable-python \
            --disable-topology --disable-ucm --disable-alisp --disable-old-symbols
          CC="${wrapper}" make -j"$(nproc)"
          CC="${wrapper}" make install

          # Target-scoped pkg-config wiring so alsa-sys probes the freshly
          # cross-built static libasound instead of the host's glibc one.
          et="$(echo "${{ matrix.rust_target }}" | tr '-' '_')"
          pc_dir="${RUNNER_TEMP}/alsa-musl/lib/pkgconfig"
          {
            echo "PKG_CONFIG_ALLOW_CROSS=1"
            echo "PKG_CONFIG_ALLOW_CROSS_${et}=1"
            echo "PKG_CONFIG_PATH_${et}=${pc_dir}"
            echo "PKG_CONFIG_LIBDIR_${et}=${pc_dir}"
            echo "PKG_CONFIG_SYSROOT_DIR_${et}=${RUNNER_TEMP}/alsa-musl"
          } >> "${GITHUB_ENV}"

      - name: Build release binary
        if: env.LEG_SELECTED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.zigbuild }}" = "true" ]; then
            cargo zigbuild --release -p openasr-cli --target ${{ matrix.rust_target }} ${{ matrix.features && format('--features {0}', matrix.features) || '' }}
          else
            cargo build --release -p openasr-cli ${{ matrix.rust_target && format('--target {0}', matrix.rust_target) || '' }} ${{ matrix.features && format('--features {0}', matrix.features) || '' }}
          fi

      # Same GPU-less-runner caveat as the Windows CUDA/HIP legs: those two
      # exes dlopen the CUDA/ROCm runtime at launch, which needs a real
      # driver this runner does not have. The Vulkan exe launches fine via
      # the llvmpipe software ICD installed above.
      # Cross legs (matrix.rust_target set) build an exe for a foreign arch the
      # runner cannot execute, so they skip every smoke step (build + package
      # validation only).
      - name: Smoke release binary
        if: runner.os != 'Windows' && matrix.features != 'cuda' && matrix.features != 'hip' && !matrix.rust_target && env.LEG_SELECTED == 'true'
        run: |
          "${RELEASE_DIR}/openasr" --version
          "${RELEASE_DIR}/openasr" --help
          "${RELEASE_DIR}/openasr" list

      # The CUDA exe import-links nvcuda.dll (NVIDIA driver) and the HIP exe
      # import-links amdhip64.dll (AMD driver), neither of which this GPU-less
      # runner has, so those cannot launch here: build + package only. The
      # Vulkan exe resolves against the SDK loader installed above, so it
      # launches and runs CPU paths here.
      - name: Smoke release binary
        if: runner.os == 'Windows' && matrix.features != 'cuda' && matrix.features != 'hip' && !matrix.rust_target && env.LEG_SELECTED == 'true'
        shell: pwsh
        run: |
          & "$env:RELEASE_DIR\openasr.exe" --version
          & "$env:RELEASE_DIR\openasr.exe" --help
          & "$env:RELEASE_DIR\openasr.exe" list

      - name: Restore model pack cache
        if: matrix.target == 'x86_64-pc-windows-msvc' && env.LEG_SELECTED == 'true'
        uses: actions/cache@v6
        with:
          path: ~/.openasr/models
          key: openasr-packs-whisper-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('model-registry/catalog.json') }}

      - name: Real-model CPU smoke
        if: matrix.target == 'x86_64-pc-windows-msvc' && env.LEG_SELECTED == 'true'
        shell: bash
        # Full-chain smoke for the CPU package: mock backend end to end, then
        # a real signature-verified pull + native CPU transcription of the
        # committed fixture (same chain family-regression exercises on
        # Linux/macOS, which have no Windows lane).
        run: |
          set -euo pipefail
          ./target/release/openasr.exe transcribe fixtures/jfk.wav --model whisper-small --backend mock --format json
          ./target/release/openasr.exe pull whisper-tiny:q4 --accept-license
          mkdir -p tmp
          OPENASR_GGML_BACKEND=cpu ./target/release/openasr.exe transcribe fixtures/jfk.wav \
            --model whisper-tiny:q4 --format text --output tmp/jfk.txt
          cat tmp/jfk.txt
          grep -qi "your country" tmp/jfk.txt

      - name: Package archive
        if: runner.os != 'Windows' && env.LEG_SELECTED == 'true'
        run: |
          set -euo pipefail
          archive="openasr-${OPENASR_VERSION}-${{ matrix.asset }}"
          dist_dir="dist/${archive}"
          mkdir -p "$dist_dir/docs"
          cp "${RELEASE_DIR}/${{ matrix.binary_name }}" "$dist_dir/"
          if [ "${{ matrix.features }}" = "cuda" ]; then
            # The CUDA exe dlopens the CUDA runtime; ship NVIDIA's
            # redistributable runtime .so files so end users only need a
            # GPU driver, not a CUDA toolkit install.
            find "${CUDA_PATH}/lib64" -maxdepth 1 \( -name 'libcudart.so*' -o -name 'libcublas.so*' -o -name 'libcublasLt.so*' \) \
              -exec cp {} "$dist_dir/" \;
          fi
          if [ "${{ matrix.features }}" = "hip" ]; then
            # The HIP exe dlopens the ROCm runtime + rocBLAS; ship them (and
            # rocBLAS's per-arch Tensile "library" dir, loaded at first
            # matmul, not at launch) so end users only need a GPU driver,
            # not the full ROCm SDK.
            cp "${ROCM_PATH}"/lib/libamdhip64.so* "${ROCM_PATH}"/lib/libhipblas.so* "${ROCM_PATH}"/lib/librocblas.so* "$dist_dir/"
            mkdir -p "$dist_dir/rocblas/library"
            cp "${ROCM_PATH}"/lib/rocblas/library/* "$dist_dir/rocblas/library/"
          fi
          cp README.md LICENSE "$dist_dir/"
          cp -R model-registry "$dist_dir/model-registry"
          cp docs/FAQ.md docs/KNOWN_LIMITATIONS.md "$dist_dir/docs/"
          tar -czf "dist/${archive}.${{ matrix.archive_ext }}" -C dist "${archive}"

      - name: Stage archive contents
        if: runner.os == 'Windows' && env.LEG_SELECTED == 'true'
        shell: pwsh
        # Split out of the old single "Package archive" step so Authenticode
        # signing (below) can run on the staged, unzipped files -- signing
        # has to happen before Compress-Archive, not after, or the exe/dll
        # bytes inside the shipped zip would stay unsigned.
        run: |
          $ErrorActionPreference = "Stop"
          $archive = "openasr-$env:OPENASR_VERSION-${{ matrix.asset }}"
          $distDir = "dist\$archive"
          New-Item -ItemType Directory -Force -Path "$distDir\docs" | Out-Null
          Copy-Item "$env:RELEASE_DIR\${{ matrix.binary_name }}" "$distDir\"
          # The CPU base build is a GGML_BACKEND_DL build (build.rs):
          # openasr.exe dynamically loads the core (ggml-base.dll + ggml.dll)
          # and the CPU backend plugins (ggml-cpu-<variant>.dll) at startup, so
          # the archive must carry them or the binary cannot launch. build.rs
          # stages them next to the binary in target/release. The GPU-feature
          # variants link ggml statically (no ggml*.dll produced), and
          # macOS/Linux stay statically linked, so this only matches on the
          # Windows CPU build.
          Get-ChildItem "$env:RELEASE_DIR" -Filter "ggml*.dll" | Copy-Item -Destination "$distDir\"
          if ("${{ matrix.features }}" -eq "cuda") {
            # The CUDA exe dynamically links the CUDA runtime; ship NVIDIA's
            # redistributable runtime DLLs so end users only need a GPU driver
            # (nvcuda.dll), not a CUDA toolkit install.
            $cudaDlls = Get-ChildItem (Join-Path $env:CUDA_PATH "bin") -Recurse -File |
              Where-Object { $_.Name -match '^(cudart64|cublas64|cublasLt64)_.*\.dll$' }
            if (-not $cudaDlls) { Write-Error "no CUDA runtime DLLs found under $env:CUDA_PATH\bin" }
            $cudaDlls | Copy-Item -Destination "$distDir\"
          }
          if ("${{ matrix.features }}" -eq "hip") {
            # The HIP exe dynamically links the ROCm runtime + BLAS; ship AMD's
            # redistributable DLLs (and rocBLAS's per-arch Tensile "library"
            # dir it loads at runtime -- omitting it fails at first matmul,
            # not at launch) so end users only need a GPU driver, not the HIP
            # SDK. hipBLASLt is optional (only some archs/tunings dispatch to
            # it); copy it too when the SDK ships it.
            $hipBin = Join-Path $env:HIP_PATH "bin"
            $hipDlls = Get-ChildItem $hipBin -File |
              Where-Object { $_.Name -match '^(amdhip64|libhipblas|rocblas|libhipblaslt)(_\d+)?\.dll$' }
            if (-not $hipDlls) { Write-Error "no HIP runtime DLLs found under $hipBin" }
            $hipDlls | Copy-Item -Destination "$distDir\"
            New-Item -ItemType Directory -Force -Path "$distDir\rocblas\library" | Out-Null
            Copy-Item (Join-Path $hipBin "rocblas\library\*") "$distDir\rocblas\library\"
            $hipbltLibrary = Join-Path $hipBin "hipblaslt\library"
            if (Test-Path $hipbltLibrary) {
              New-Item -ItemType Directory -Force -Path "$distDir\hipblaslt\library" | Out-Null
              Copy-Item (Join-Path $hipbltLibrary "*") "$distDir\hipblaslt\library\"
            }
          }
          Copy-Item README.md,LICENSE "$distDir\"
          Copy-Item model-registry "$distDir\model-registry" -Recurse
          Copy-Item docs\FAQ.md,docs\KNOWN_LIMITATIONS.md "$distDir\docs\"
          Add-Content $env:GITHUB_ENV "DIST_DIR=$distDir"
          Add-Content $env:GITHUB_ENV "ARCHIVE_NAME=$archive"

      # Cache the downloaded LunarG archive across runs (retries, re-dispatch)
      # so the ~19MB fetch only happens once per pinned VULKAN_LOADER_VERSION,
      # not once per run -- same idea as the "Cache AMD HIP SDK install" step
      # above. The staging step below still re-verifies the hash on every run
      # regardless of cache hit, so a stale/corrupted cache entry can never
      # silently pass.
      - name: Cache Vulkan loader redistributable
        if: matrix.features == 'vulkan' && runner.os == 'Windows' && env.LEG_SELECTED == 'true'
        uses: actions/cache@v6
        with:
          path: ${{ runner.temp }}\vulkan-runtime-components.zip
          key: vulkan-loader-${{ env.VULKAN_LOADER_VERSION }}

      - name: Stage Vulkan loader (LunarG VulkanRT redistributable)
        if: matrix.features == 'vulkan' && runner.os == 'Windows' && env.LEG_SELECTED == 'true'
        shell: pwsh
        # openasr.exe's PE import table names vulkan-1.dll (ggml-vulkan links
        # Vulkan::Vulkan, the SYSTEM Vulkan loader import lib) -- the loader
        # itself is a thin, GPU-vendor-agnostic dispatch shim that does NOT
        # require a GPU or driver to LOAD, only to enumerate a device later.
        # But the OS module loader resolves every PE import before main()
        # runs at all, before openasr-core's HardwareFallbackPolicy ever gets
        # a chance to fall back to CPU. A machine with no GPU driver installed
        # (a clean Windows install, a VM) typically has no vulkan-1.dll
        # anywhere on its DLL search path either (a driver install is what
        # normally puts it there), so the exe dies at load time with
        # STATUS_DLL_NOT_FOUND (0xC0000135) before any CPU fallback can run
        # -- see #132.
        #
        # Fix: LunarG's Windows Vulkan Runtime redistributable ships the SAME
        # vulkan-1.dll every GPU driver installs, under a license (Apache-2.0
        # governs the loader itself; see VulkanRT-License.txt inside the
        # archive) that explicitly permits redistribution, entirely
        # independent of any GPU driver. Staging a pinned, hash-verified copy
        # beside openasr.exe means the loader ALWAYS resolves (Windows
        # searches the application directory before anything else on the
        # default DLL search path), so a missing/absent GPU driver degrades
        # exactly the way the original design intended: the loader loads
        # fine, enumerates zero devices, and HardwareFallbackPolicy falls
        # back to CPU in Rust -- never a DLL-load failure.
        #
        # Mirrors openasr-app's apps/desktop/scripts/stage-vulkan-loader.mjs
        # (identical version pin + identical two-layer hash verification) for
        # the desktop sidecar bundle. Fail-closed throughout: a download
        # failure, a hash mismatch at either layer, or a missing extracted
        # file all throw -- there is no silent fallback to an unverified DLL.
        run: |
          $ErrorActionPreference = "Stop"
          $archivePath = Join-Path $env:RUNNER_TEMP "vulkan-runtime-components.zip"

          function Get-Sha256Hex($path) {
            (Get-FileHash -Path $path -Algorithm SHA256).Hash.ToLowerInvariant()
          }

          $needDownload = $true
          if (Test-Path $archivePath) {
            if ((Get-Sha256Hex $archivePath) -eq $env:VULKAN_LOADER_ARCHIVE_SHA256) {
              Write-Host "stage-vulkan-loader: reusing cached $archivePath (sha256 verified)."
              $needDownload = $false
            } else {
              Write-Host "stage-vulkan-loader: cached $archivePath failed sha256 verification -- re-downloading."
              Remove-Item -Force $archivePath
            }
          }
          if ($needDownload) {
            $url = "https://sdk.lunarg.com/sdk/download/$env:VULKAN_LOADER_VERSION/windows/vulkan-runtime-components.zip"
            Write-Host "stage-vulkan-loader: downloading $url ..."
            curl.exe --fail --location --retry 3 --output $archivePath $url
            if ($LASTEXITCODE -ne 0) { Write-Error "download failed (curl exit $LASTEXITCODE)"; exit 1 }
          }

          $actualArchiveSha = Get-Sha256Hex $archivePath
          if ($actualArchiveSha -ne $env:VULKAN_LOADER_ARCHIVE_SHA256) {
            Write-Error ("sha256 mismatch for Vulkan runtime archive: expected $env:VULKAN_LOADER_ARCHIVE_SHA256, got $actualArchiveSha. " +
              "Refusing to stage an unverified Vulkan runtime archive -- if LunarG genuinely rotated this release's bytes, re-pin " +
              "VULKAN_LOADER_ARCHIVE_SHA256 (and VULKAN_LOADER_DLL_SHA256) here AND in openasr-app's stage-vulkan-loader.mjs, " +
              "cross-checked against https://vulkan.lunarg.com/sdk/sha/$env:VULKAN_LOADER_VERSION/windows/VulkanRT-X64-$env:VULKAN_LOADER_VERSION-Components.zip.json.")
            exit 1
          }

          $extractDir = Join-Path $env:RUNNER_TEMP "vulkan-runtime-components-extracted"
          if (Test-Path $extractDir) { Remove-Item -Recurse -Force $extractDir }
          Expand-Archive -Path $archivePath -DestinationPath $extractDir -Force

          # The zip's top-level folder name is version-specific
          # (VulkanRT-X64-<version>-Components\x64\vulkan-1.dll), so search by
          # filename instead of hardcoding it.
          $dll = Get-ChildItem -Path $extractDir -Recurse -Filter "vulkan-1.dll" |
            Where-Object { $_.FullName -like "*\x64\*" } | Select-Object -First 1
          if (-not $dll) {
            Write-Error "vulkan-1.dll not found under $extractDir\*\x64 -- archive layout may have changed."
            exit 1
          }

          $actualDllSha = Get-Sha256Hex $dll.FullName
          if ($actualDllSha -ne $env:VULKAN_LOADER_DLL_SHA256) {
            Write-Error ("Extracted vulkan-1.dll sha256 $actualDllSha does not match the pinned $env:VULKAN_LOADER_DLL_SHA256. " +
              "The archive's own sha256 already verified against LunarG's published hash, so this means the archive's internal " +
              "layout changed (wrong file extracted) -- refusing to stage an unverified DLL.")
            exit 1
          }

          Copy-Item $dll.FullName (Join-Path $env:DIST_DIR "vulkan-1.dll") -Force
          Write-Host "stage-vulkan-loader: staged $(Join-Path $env:DIST_DIR 'vulkan-1.dll') (Vulkan runtime $env:VULKAN_LOADER_VERSION, sha256 $actualDllSha)."

          # Ship the loader's own upstream license text verbatim (from the
          # same downloaded, hash-verified archive -- not hand-transcribed)
          # so the Apache-2.0-licensed redistributable carries its required
          # attribution inside the zip, same as README.md/LICENSE above.
          $licenseSrc = Get-ChildItem -Path $extractDir -Recurse -Filter "VulkanRT-License.txt" | Select-Object -First 1
          if (-not $licenseSrc) {
            Write-Error "VulkanRT-License.txt not found in the Vulkan runtime archive -- archive layout may have changed."
            exit 1
          }
          Copy-Item $licenseSrc.FullName (Join-Path $env:DIST_DIR "VULKAN-LOADER-LICENSE.txt") -Force
          Write-Host "stage-vulkan-loader: staged VULKAN-LOADER-LICENSE.txt from the archive's own VulkanRT-License.txt."

      - name: Resolve Windows binaries to sign
        if: runner.os == 'Windows' && env.LEG_SELECTED == 'true'
        shell: pwsh
        # Only files we actually build ourselves: openasr.exe, plus the CPU
        # leg's own ggml*.dll (compiled from the vendored submodule by this
        # same job, not a third-party redistributable). Deliberately excludes
        # the vendor GPU runtime DLLs staged above (NVIDIA cudart64_*/
        # cublas64_*/cublasLt64_*, AMD amdhip64_*/libhipblas_*/rocblas_*/
        # libhipblaslt_*, LunarG's vulkan-1.dll) -- those are third-party
        # redistributables (some already carrying the vendor's own Authenticode
        # signature) and are not ours to re-sign. vulkan-1.dll does not match
        # the "ggml*.dll" filter below, so it is excluded automatically; this
        # comment just makes that exclusion explicit for the reader.
        run: |
          $ErrorActionPreference = "Stop"
          $signTargets = @((Resolve-Path "$env:DIST_DIR\${{ matrix.binary_name }}").Path)
          $ggmlDlls = Get-ChildItem "$env:DIST_DIR" -Filter "ggml*.dll" -ErrorAction SilentlyContinue
          if ($ggmlDlls) { $signTargets += $ggmlDlls.FullName }
          Write-Host "files to sign ($($signTargets.Count)):"
          $signTargets | ForEach-Object { Write-Host " - $_" }
          Add-Content $env:GITHUB_ENV "SIGN_FILES<<SIGN_FILES_EOF"
          Add-Content $env:GITHUB_ENV ($signTargets -join "`n")
          Add-Content $env:GITHUB_ENV "SIGN_FILES_EOF"

      - name: Check Trusted Signing credentials
        if: runner.os == 'Windows' && env.LEG_SELECTED == 'true'
        id: signing-check
        shell: bash
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        # This workflow has no `pull_request` trigger (see the trigger
        # comment at the top of this file), so a fork PR never reaches this
        # job with -- or without -- secrets. Every run that gets here is a
        # real tag push, release-core.yml's workflow_call, or a maintainer's
        # workflow_dispatch, all of which do have repo secrets. The only
        # legitimate no-secrets case is a maintainer smoke-testing build/
        # package logic via workflow_dispatch with dry_run=true before the
        # Azure Trusted Signing secrets are configured -- see the fail-closed
        # step below.
        run: |
          set -euo pipefail
          if [ -n "${AZURE_TENANT_ID:-}" ] && [ -n "${AZURE_CLIENT_ID:-}" ] && [ -n "${AZURE_CLIENT_SECRET:-}" ]; then
            echo "have_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_secrets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Refuse to ship an unsigned Windows release binary
        if: runner.os == 'Windows' && env.LEG_SELECTED == 'true' && steps.signing-check.outputs.have_secrets != 'true' && github.event.inputs.dry_run != 'true'
        shell: bash
        run: |
          echo "::error::AZURE_TENANT_ID/AZURE_CLIENT_ID/AZURE_CLIENT_SECRET are not set -- refusing to package an unsigned Windows release binary. Configure the Azure Trusted Signing service principal secrets (see openasr-app's apps/desktop/SIGNING-WINDOWS.md for the account/profile this reuses), or re-run this workflow_dispatch with dry_run=true to build without signing for local debugging only." >&2
          exit 1

      # Azure Trusted Signing (Artifact Signing): same account/certificate
      # profile as the OpenASR Desktop Windows installer (openasr-sign /
      # openasr-codesign, publisher "Caelum Inc.") -- see openasr-app's
      # apps/desktop/SIGNING-WINDOWS.md for the account itself. The service
      # principal behind these secrets needs the "Artifact Signing
      # Certificate Profile Signer" role on that account (see this repo's
      # docs/RELEASING.md); it may be a different App Registration than the
      # desktop repo's, but must be granted the same role on the same
      # account/profile.
      # GitHub's windows runner image stopped shipping a pre-registered PSGallery
      # PowerShell repository (surfaced alongside the Node 20 -> 24 default bump),
      # so azure/trusted-signing-action's internal `Install-Module TrustedSigning
      # -Repository PSGallery` fails with "Unable to find repository 'PSGallery'".
      # Re-register and trust it (non-interactive) before the signing action runs.
      - name: Ensure PSGallery is registered (runner image workaround)
        if: runner.os == 'Windows' && env.LEG_SELECTED == 'true' && steps.signing-check.outputs.have_secrets == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
            Register-PSRepository -Default
          }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Get-PSRepository | Format-Table -AutoSize

      - name: Sign Windows binaries (Azure Trusted Signing)
        if: runner.os == 'Windows' && env.LEG_SELECTED == 'true' && steps.signing-check.outputs.have_secrets == 'true'
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: openasr-sign
          certificate-profile-name: openasr-codesign
          files: ${{ env.SIGN_FILES }}
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Package archive
        if: runner.os == 'Windows' && env.LEG_SELECTED == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          # Smoke the binary from the staged dist dir (NOT target/release,
          # whose build.rs-seeded DLLs would mask a packaging gap), so a broken
          # archive fails here before it ships. The CUDA/HIP exes cannot
          # launch without a matching GPU driver, so they are exempt
          # (validated on hardware). A cross leg (rust_target set) builds a
          # foreign-arch exe the runner cannot execute, so it is exempt too.
          # Running this AFTER signing also verifies signing did not corrupt
          # the binary.
          if ("${{ matrix.features }}" -ne "cuda" -and "${{ matrix.features }}" -ne "hip" -and "${{ matrix.rust_target }}" -eq "") {
            & "$env:DIST_DIR\${{ matrix.binary_name }}" --version
            if ($LASTEXITCODE -ne 0) { exit 1 }
          }
          Compress-Archive -Path "$env:DIST_DIR" -DestinationPath "dist\$env:ARCHIVE_NAME.${{ matrix.archive_ext }}" -Force

      # Covers every leg that reaches this point, including `experimental:
      # true` ones (windows-arm64, musl) -- they still ship a release asset,
      # so they still get provenance. Only the packaged archive is attested,
      # not the SHA256SUMS text file assembled later in `checksums`.
      - name: Attest build provenance
        if: env.LEG_SELECTED == 'true'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/openasr-${{ env.OPENASR_VERSION }}-${{ matrix.asset }}.${{ matrix.archive_ext }}

      - name: Upload archive
        if: env.LEG_SELECTED == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: openasr-${{ matrix.target }}
          path: dist/openasr-${{ env.OPENASR_VERSION }}-${{ matrix.asset }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  xcframework:
    name: Build OpenASR.xcframework
    # Not part of the `build` matrix above: it is a macOS/iOS SDK artifact
    # (three arch slices assembled via `xcodebuild -create-xcframework`), not
    # a CLI binary, so it gets its own job with its own toolchain/packaging
    # shape. See scripts/build-xcframework.sh and docs/SDK_IOS_MACOS.md for
    # the build itself -- this job only adds release packaging (zip + sha256)
    # around it. Mirrors (and supersedes for tagged releases) the
    # workflow_dispatch-only `xcframework` job in ci.yml, which stays for
    # ad-hoc dev-time builds off any branch; see the comment there.
    runs-on: macos-latest
    timeout-minutes: 60
    # id-token/attestations for the build-provenance attestation step below;
    # this job only reads the repo and uploads a workflow artifact, so
    # contents stays read-only.
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
          ref: ${{ inputs.ref || github.ref }}

      - name: Resolve workspace version
        shell: bash
        run: |
          set -euo pipefail
          version="$(grep -m1 -E '^version = "' Cargo.toml | sed -E 's/^version = "([^"]+)".*/\1/')"
          if [ -z "${version}" ]; then
            echo "could not read workspace version from Cargo.toml" >&2
            exit 1
          fi
          echo "OPENASR_VERSION=${version}" >> "${GITHUB_ENV}"

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.95.0 --profile minimal
          rustup default 1.95.0
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim aarch64-apple-darwin
          rustc --version
          cargo --version

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-binaries-xcframework

      - name: Install cbindgen
        run: cargo install cbindgen --locked

      - name: Header drift gate
        run: scripts/generate-ffi-header.sh --check

      - name: Build xcframework (three slices)
        run: scripts/build-xcframework.sh

      - name: Package xcframework archive
        run: |
          set -euo pipefail
          archive="openasr-${OPENASR_VERSION}-xcframework"
          mkdir -p dist
          (cd target/xcframework && zip -r -X -q "${GITHUB_WORKSPACE}/dist/${archive}.zip" OpenASR.xcframework)
          (cd dist && shasum -a 256 "${archive}.zip" > "${archive}.zip.sha256")
          cat "dist/${archive}.zip.sha256"

      # Only the zip is attested, not its .sha256 sidecar text file.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/openasr-${{ env.OPENASR_VERSION }}-xcframework.zip

      - name: Upload xcframework archive
        uses: actions/upload-artifact@v7
        with:
          name: openasr-xcframework
          path: |
            dist/openasr-${{ env.OPENASR_VERSION }}-xcframework.zip
            dist/openasr-${{ env.OPENASR_VERSION }}-xcframework.zip.sha256
          if-no-files-found: error

  checksums:
    name: Collect checksums
    needs: [build, xcframework]
    # Sum whatever archives were produced even if one matrix leg failed, so a
    # single flaky variant does not block checksums for the rest.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      # Checked out FIRST, before anything is downloaded/generated into the
      # workspace: actions/checkout defaults to `clean: true` (`git clean
      # -ffdx`), which would otherwise wipe the untracked staging/dist
      # directories the later steps populate. Only needed for the
      # backends-manifest step below (version + source commit), but harmless
      # for every other run, so it stays unconditional here rather than
      # threading the `only_target` skip condition through step ordering.
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: Download archives
        uses: actions/download-artifact@v8
        with:
          path: staging
          merge-multiple: true
      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          mkdir -p dist
          find staging -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} dist/ \;
          cd dist
          sha256sum * > SHA256SUMS
          cat SHA256SUMS
      - name: Upload SHA256SUMS
        uses: actions/upload-artifact@v7
        with:
          name: SHA256SUMS
          path: dist/SHA256SUMS
          if-no-files-found: error

      # UNSIGNED backends-manifest.json: the per-release index the desktop
      # app uses to download a switchable Windows GPU-kernel sidecar
      # (vulkan/cuda/hip) at runtime. Only hashes/sizes already-public
      # archives -- no secret involved, so (unlike signing) this is safe to
      # run in CI. Skipped on a single-leg `only_target` dispatch (same gate
      # `verify-completeness` uses below): that run intentionally produces
      # only one archive, not the full Windows GPU trio this needs.
      - name: Generate backends-manifest.json (unsigned)
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.only_target == ''
        run: |
          set -euo pipefail
          version="$(grep -m1 -E '^version = "' Cargo.toml | sed -E 's/^version = "([^"]+)".*/\1/')"
          commit="$(git rev-parse HEAD)"
          python3 tooling/release-manifest/backends_manifest.py generate \
            --version "$version" --source-commit "$commit" \
            --dist-dir dist --out dist/backends-manifest.json
          cat dist/backends-manifest.json
      # NOT uploaded pre-signed: `backends-manifest.signature.json` is a
      # separate, maintainer-run LOCAL step (the Ed25519 signing seed never
      # enters CI -- same policy as the model catalog, see
      # tooling/publish-model/scripts/publish_catalog.sh). After this
      # workflow finishes, sign and attach the signature with:
      #   OPENASR_CATALOG_SIGNING_KEY_SEED_HEX=<real seed> \
      #     cargo run -p openasr-cli -- __openasr-sign-backends-manifest \
      #       backends-manifest.json --out backends-manifest.signature.json \
      #       --manifest-url https://dl.openasr.org/core/v<version>/backends-manifest.json
      #   gh release upload v<version> backends-manifest.signature.json --clobber
      - name: Upload backends-manifest.json
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.only_target == ''
        uses: actions/upload-artifact@v7
        with:
          name: backends-manifest
          path: dist/backends-manifest.json
          if-no-files-found: error

  upload-to-release:
    name: Upload assets to release
    needs: checksums
    if: ${{ !cancelled() && needs.checksums.result == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Resolve the release tag for this ref
        id: tag
        shell: bash
        # Only a ref that is (or resolves to) a `v*` tag has a GitHub Release
        # to attach assets to. A `workflow_dispatch` run against a branch, or
        # any other ref shape, has nothing to upload to -- that is not an
        # error, just a no-op (lets this workflow still be dispatched for
        # ad-hoc build-only smoke runs).
        run: |
          set -euo pipefail
          ref="${{ inputs.ref }}"
          if [ -z "$ref" ]; then
            ref="${{ github.ref }}"
          fi
          case "$ref" in
            refs/tags/*) tag="${ref#refs/tags/}" ;;
            v[0-9]*.*) tag="$ref" ;;
            *) tag="" ;;
          esac
          if [ -z "$tag" ]; then
            echo "ref '$ref' does not resolve to a release tag -- nothing to upload" >&2
            echo "tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "tag ${tag} does not exist on origin -- nothing to upload" >&2
            echo "tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Download archives + SHA256SUMS
        if: steps.tag.outputs.tag != ''
        uses: actions/download-artifact@v8
        with:
          path: staging
          merge-multiple: true

      - name: List what would be uploaded
        if: steps.tag.outputs.tag != ''
        run: |
          set -euo pipefail
          echo "release: ${{ steps.tag.outputs.tag }}"
          find staging -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' -o -name 'SHA256SUMS' -o -name 'backends-manifest.json' \) -print | sort

      - name: Upload assets to release
        if: steps.tag.outputs.tag != '' && github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          if ! gh release view "$tag" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "release ${tag} does not exist yet -- release-core.yml should create it before calling this workflow" >&2
            exit 1
          fi
          # nullglob so a pattern with no matches (e.g. no *.sha256 sidecars
          # if the xcframework leg did not run, or no backends-manifest.json
          # on a single-leg `only_target` dispatch) drops out of the arg list
          # instead of being passed to `gh` as a literal, unmatched path.
          shopt -s nullglob
          assets=(staging/*.tar.gz staging/*.zip staging/*.sha256 staging/SHA256SUMS staging/backends-manifest.json)
          # --clobber so a re-run (retrying a flaky leg) replaces stale assets
          # instead of failing on "asset already exists".
          gh release upload "$tag" "${assets[@]}" \
            --repo "${{ github.repository }}" --clobber

      - name: Dry run -- skipping upload
        if: steps.tag.outputs.tag != '' && github.event.inputs.dry_run == 'true'
        run: echo "dry_run=true -- not uploading to ${{ steps.tag.outputs.tag }} (evaluated condition/logic only)"

  verify-completeness:
    name: Verify release completeness
    needs: upload-to-release
    # Single-leg dispatch runs (only_target set) intentionally produce just
    # one archive, not the full asset set this job asserts on -- skip the
    # completeness gate for those runs instead of failing it by design.
    if: ${{ needs.upload-to-release.outputs.tag != '' && (github.event_name != 'workflow_dispatch' || github.event.inputs.only_target == '') }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Resolve workspace version
        run: |
          set -euo pipefail
          version="$(grep -m1 -E '^version = "' Cargo.toml | sed -E 's/^version = "([^"]+)".*/\1/')"
          echo "OPENASR_VERSION=${version}" >> "${GITHUB_ENV}"

      - name: Assert the release has every expected matrix asset
        # Keep this TARGETS list (friendly asset names, matching each matrix
        # leg's `asset:` field) in sync with jobs.build.strategy.matrix.include
        # above, plus jobs.xcframework's asset -- this is the release-integrity
        # gate: a release "shipped" but missing a platform's archive (e.g. one
        # matrix leg failed and `checksums` silently dropped it, per its
        # `!cancelled()` condition)
        # must fail loudly here instead of quietly shipping partial coverage.
        # `experimental: true` legs (e.g. windows-arm64) are deliberately NOT
        # listed: they may fail without failing the run, so requiring their
        # asset here would defeat the escape hatch. Promote such a leg (drop
        # `experimental`, add its asset:ext here) once it proves green.
        run: |
          set -euo pipefail
          tag="${{ needs.upload-to-release.outputs.tag }}"
          version="${OPENASR_VERSION}"

          TARGETS=(
            "linux-x86_64:tar.gz"
            "linux-arm64:tar.gz"
            "macos-x86_64:tar.gz"
            "macos-arm64:tar.gz"
            "windows-x86_64:zip"
            "windows-x86_64-vulkan:zip"
            "windows-x86_64-cuda:zip"
            "windows-x86_64-rocm:zip"
            "linux-x86_64-vulkan:tar.gz"
            "linux-x86_64-cuda:tar.gz"
            "linux-x86_64-rocm:tar.gz"
            # Not a CLI binary leg (see jobs.xcframework above), but still a
            # released, version-named asset -- keep it in this same
            # completeness gate so a broken xcframework build fails loudly
            # instead of quietly shipping a release without the SDK.
            "xcframework:zip"
          )

          expected_file="$(mktemp)"
          for entry in "${TARGETS[@]}"; do
            target="${entry%%:*}"
            ext="${entry##*:}"
            echo "openasr-${version}-${target}.${ext}" >> "$expected_file"
          done
          echo "openasr-${version}-xcframework.zip.sha256" >> "$expected_file"
          echo "SHA256SUMS" >> "$expected_file"
          sort -o "$expected_file" "$expected_file"

          actual_file="$(mktemp)"
          gh release view "$tag" --repo "${{ github.repository }}" --json assets \
            --jq '.assets[].name' | sort > "$actual_file"

          echo "== expected =="
          cat "$expected_file"
          echo "== actual =="
          cat "$actual_file"

          missing="$(comm -23 "$expected_file" "$actual_file")"
          if [ -n "$missing" ]; then
            echo "::error::release ${tag} is missing expected asset(s):"
            echo "$missing"
            exit 1
          fi
          echo "release ${tag} has all $(wc -l < "$expected_file" | tr -d ' ') expected assets."
