name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  # Manual-only: builds the iOS/macOS xcframework SDK artifact (see
  # scripts/build-xcframework.sh, docs/SDK_IOS_MACOS.md). Not run on every PR
  # -- three arch slices plus `xcodebuild -create-xcframework` is too heavy
  # for the per-PR gate; `ios-compile` below already covers openasr-ffi's
  # compile health for aarch64-apple-ios on every push/PR.
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust workspace gate
    # GitHub-hosted: runs for pushes and every PR, including forks (the repo is
    # public, so hosted-runner minutes are free and unlimited).
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libasound2-dev
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - name: Catalog drift gate
        run: tooling/publish-model/scripts/regenerate_all.sh --check
      - name: Python helper gates
        run: |
          python3 -m unittest discover -s tooling/publish-model/scripts -p '*_test.py'
          python3 -m unittest discover -s tooling/native-streaming-smoke -p 'test_*.py'
          python3 -m unittest discover -s tooling/public-hf-e2e -p 'test_*.py'
          python3 -m unittest discover -s tooling/family-regression -p 'test_*.py'
      - name: Desktop system-audio backend gate
        run: |
          cargo fmt --check --manifest-path tooling/system-audio-check/Cargo.toml
          cargo test --locked --manifest-path tooling/system-audio-check/Cargo.toml -- --nocapture
          cargo check --locked --manifest-path tooling/system-audio-check/Cargo.toml --target x86_64-pc-windows-msvc
      - run: cargo clippy --all-targets -- -D warnings
      - name: Golden diff gate
        run: cargo test -p openasr-core golden_diff -- --nocapture
      - name: Catalog signature gate
        run: cargo test -p openasr-core bundled_catalog_signature_verifies_committed_catalog_and_epoch -- --nocapture
      - uses: taiki-e/install-action@nextest
      - name: Workspace tests
        run: cargo nextest run --workspace
      - name: Doctests
        run: cargo test --workspace --doc

  system-audio-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      # The Linux gate (job `rust`) compiles the Linux backend natively and
      # cross-checks Windows, but the macOS CoreAudio backend (the largest
      # system-audio module) had no compile coverage. Build + test it on a real
      # macOS runner so a CoreAudio-backend break fails CI.
      - name: macOS system-audio backend gate
        run: |
          cargo check --manifest-path tooling/system-audio-check/Cargo.toml
          cargo test --manifest-path tooling/system-audio-check/Cargo.toml -- --nocapture

  ios-compile:
    name: iOS compile gate (aarch64-apple-ios)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: aarch64-apple-ios
      - uses: Swatinem/rust-cache@v2
      # Phase 1: a compile-only gate for the iOS device build of the engine
      # crate -- no xcframework packaging, no app target. GitHub-hosted macOS
      # runners ship a full Xcode with the iphoneos SDK, so this exercises the
      # real cross-compile path: ggml via CMake's built-in Apple platform
      # support (crates/openasr-core/build.rs), plus the Rust dependency tree
      # incl. reqwest/ring's iOS asm build. openasr-cli/-server/-system-audio
      # are desktop/CLI-shaped (system audio capture, HTTP server) and are not
      # part of this gate; openasr-core alone represents the inference engine.
      # Phase 2 adds openasr-ffi (the xcframework SDK's C ABI crate, see
      # crates/openasr-ffi) to the same check -- it wraps openasr-core so its
      # own iOS cross-compile health rides along here for free, cheaper than
      # the full xcframework build (see the `xcframework` job below).
      - name: Check openasr-core and openasr-ffi for aarch64-apple-ios
        run: cargo check -p openasr-core -p openasr-ffi --target aarch64-apple-ios

  dependency-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          rust-version: 1.95.0

  xcframework:
    name: Build OpenASR.xcframework (manual)
    # Manual-only (see the workflow_dispatch trigger comment above): three
    # arch slices (ios-arm64 device, ios-arm64-simulator, macos-arm64) plus
    # `xcodebuild -create-xcframework` is too heavy for the per-PR gate.
    # GitHub-hosted macos-latest ships full Xcode (iphoneos + iphonesimulator
    # SDKs), so unlike a Command-Line-Tools-only dev machine this produces all
    # three slices -- see scripts/build-xcframework.sh's SDK-detection
    # fallback for the local (CLT-only) degraded path.
    #
    # This is the dev-time, any-branch, build-only variant (raw xcframework
    # dir as a build artifact, no packaging/release upload). The release
    # train's version lives in .github/workflows/release-binaries.yml's
    # `xcframework` job (zip + sha256 + attached to the tagged GitHub
    # Release, gated by verify-completeness) -- keep the build steps here
    # (targets/cbindgen/header-check/build script) in sync with that job if
    # either changes.
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Install cbindgen
        run: cargo install cbindgen --locked
      - name: Header drift gate
        run: scripts/generate-ffi-header.sh --check
      - name: Build xcframework
        run: scripts/build-xcframework.sh
      - uses: actions/upload-artifact@v7
        with:
          name: OpenASR.xcframework
          path: target/xcframework/OpenASR.xcframework
          if-no-files-found: error
