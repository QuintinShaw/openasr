name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    # Self-hosted: run on pushes and same-repo PRs only — never run fork PR code on
    # the maintainer's self-hosted runner. Fork PRs get the GitHub-hosted `rust-public` gate instead.
    if: github.repository_owner == 'QuintinShaw' && (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: [self-hosted, Linux, ARM64]
    # A hung job on the single self-hosted runner blocks every queued run.
    timeout-minutes: 30
    env:
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Verify Linux audio build dependencies
        if: runner.os == 'Linux'
        run: |
          dpkg -s libasound2-dev >/dev/null 2>&1 || {
            echo "::error::Missing libasound2-dev on the self-hosted runner. Preinstall it on the runner image."
            exit 1
          }
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy
          targets: x86_64-pc-windows-msvc
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true
          cache-bin: false
          cache-on-failure: true
          cache-targets: true
          shared-key: openasr-self-hosted-arm64
      - run: cargo fmt --check
      - name: Catalog drift gate
        run: tooling/publish-model/scripts/regenerate_all.sh --check
      - name: Python helper gates
        run: |
          python3 -m unittest discover -s tooling/publish-model/scripts -p '*_test.py'
          python3 -m unittest discover -s tooling/native-streaming-smoke -p 'test_*.py'
          python3 -m unittest discover -s tooling/public-hf-e2e -p 'test_*.py'
      - name: Desktop system-audio backend gate
        run: |
          cargo fmt --check --manifest-path tooling/system-audio-check/Cargo.toml
          cargo test --locked --manifest-path tooling/system-audio-check/Cargo.toml -- --nocapture
          cargo check --locked --manifest-path tooling/system-audio-check/Cargo.toml --target x86_64-pc-windows-msvc
      - run: cargo clippy --all-targets -- -D warnings
      - name: Golden diff gate
        run: cargo test -p openasr-core golden_diff -- --nocapture
      - name: Catalog signature gate
        run: cargo test -p openasr-core bundled_catalog_signature_verifies_committed_catalog_and_epoch -- --nocapture
      - uses: taiki-e/install-action@nextest
      # The self-hosted runner's /tmp is a small RAM-backed tmpfs that accumulates
      # state across jobs and can report 0 free bytes, which trips tests that create
      # temp dirs there (e.g. pull's disk-space preflight: InsufficientSpace). The
      # workspace disk has ample space (build/sccache/target all write to it), so
      # point TMPDIR at a workspace-local dir for the test steps. This does not relax
      # any check — it just runs the temp I/O on a filesystem that actually has room.
      - name: Stage test TMPDIR off the runner's tmpfs
        run: mkdir -p "${{ github.workspace }}/.ci-tmp"
      - name: Workspace tests
        run: cargo nextest run --workspace
        env:
          TMPDIR: ${{ github.workspace }}/.ci-tmp
      - name: Doctests
        run: cargo test --workspace --doc
        env:
          TMPDIR: ${{ github.workspace }}/.ci-tmp
      - name: Print sccache stats
        if: always()
        run: sccache --show-stats || true

  rust-public:
    # GitHub-hosted core gate so external/fork PRs (which cannot reach the
    # self-hosted runner) still get fmt/clippy/test/cargo-deny signal.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libasound2-dev
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace
      - run: cargo test --workspace --doc
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          rust-version: 1.95.0

  system-audio-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      # The Linux gate (job `rust`) compiles the Linux backend natively and
      # cross-checks Windows, but the macOS CoreAudio backend (the largest
      # system-audio module) had no compile coverage. Build + test it on a real
      # macOS runner so a CoreAudio-backend break fails CI.
      - name: macOS system-audio backend gate
        run: |
          cargo check --manifest-path tooling/system-audio-check/Cargo.toml
          cargo test --manifest-path tooling/system-audio-check/Cargo.toml -- --nocapture

  dependency-policy:
    # cargo-deny only reads Cargo metadata (no build), so it queues briefly
    # behind the rust job on the single self-hosted box. Kept on self-hosted (not
    # a GitHub-hosted runner) so it does not consume hosted-runner minutes.
    # Skipped for fork PRs (the GitHub-hosted `rust-public` lane runs cargo-deny there).
    if: github.repository_owner == 'QuintinShaw' && (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: [self-hosted, Linux, ARM64]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          rust-version: 1.95.0
