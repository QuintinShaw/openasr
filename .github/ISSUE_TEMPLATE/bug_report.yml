name: Bug report
description: Report a first-run, CLI, API, registry, backend, or documentation issue.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue. Do not attach private audio unless it is safe to share publicly.
  - type: input
    id: version
    attributes:
      label: OpenASR version or commit SHA
      description: Paste the version, tag, or commit SHA you tested.
      placeholder: "commit f946d59"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 15.4, Ubuntu 24.04, Windows 11"
    validations:
      required: true
  - type: input
    id: rust
    attributes:
      label: Rust version
      placeholder: "rustc 1.86.0"
    validations:
      required: false
  - type: input
    id: gpu
    attributes:
      label: GPU model and graphics driver version
      description: |
        Required for any crash, hang, or backend/Vulkan/Metal issue. If your report is
        unrelated to GPU/backend behavior (e.g. a docs typo), type "N/A".
        Windows: Settings -> System -> Display -> Advanced display, or Device Manager ->
        Display adapters -> right-click your GPU -> Properties -> Driver tab.
        macOS: Apple menu -> About This Mac -> More Info -> System Report -> Graphics/Displays.
        Linux: `vulkaninfo --summary` or `glxinfo -B`.
      placeholder: "NVIDIA GeForce RTX 4070, driver 566.14 (Vulkan)"
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command run or API request
      description: Include the exact command or curl/API request shape.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      description: Redact secrets, private paths, and private audio names if needed.
      render: text
    validations:
      required: false
  - type: dropdown
    id: openasr_home
    attributes:
      label: Was OPENASR_HOME customized?
      options:
        - "No"
        - "Yes"
        - "Not sure"
    validations:
      required: true
  - type: dropdown
    id: backend
    attributes:
      label: Backend used
      description: >-
        OpenASR's default is native (real ggml transcription). Only pick "mock" if
        you explicitly passed --backend mock (a deterministic stub used for CI/plumbing,
        never real audio). If you did not pass --backend yourself, pick the first option.
      options:
        - "Not sure / did not pass --backend (this is native, the default)"
        - "native (default, real transcription)"
        - "mock (explicit --backend mock flag only)"
      default: 0
    validations:
      required: true
  - type: textarea
    id: native_pack
    attributes:
      label: Native .oasr pack details, if used
      description: For the native backend, include the model family and quant of the .oasr pack. Do not paste secrets or sensitive private paths.
      placeholder: "Family: whisper-small\nQuant: q4_k"
    validations:
      required: false
  - type: checkboxes
    id: audio_confirmation
    attributes:
      label: Audio sharing confirmation
      options:
        - label: I have not attached private audio unless it is safe to share publicly.
          required: true
