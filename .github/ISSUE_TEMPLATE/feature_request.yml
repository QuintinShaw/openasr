name: Feature request
description: Propose a scoped feature or improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the smallest useful version of the feature.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or other designs did you consider?
    validations:
      required: false
  - type: checkboxes
    id: area
    attributes:
      label: Area
      options:
        - label: CLI
        - label: API
        - label: Docs
        - label: Backend
        - label: Model registry
        - label: Examples
        - label: Other
  - type: textarea
    id: local_first
    attributes:
      label: Local-first considerations
      description: Explain any privacy, offline, model download, or telemetry implications.
    validations:
      required: true
